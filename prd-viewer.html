<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>SunnyFit PRD Viewer</title>
    <script src="https://cdn.jsdelivr.net/npm/marked/marked.min.js"></script>
    <style>
        :root {
            --primary-color: #f15a24; /* 假设的 SunnyFit 品牌色 */
            --bg-color: #f5f7fa;
            --text-color: #333;
            --border-color: #e4e7ed;
        }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: var(--bg-color);
            color: var(--text-color);
            height: 100vh;
            overflow: hidden;
            display: grid;
            grid-template-rows: 56px 1fr;
            grid-template-areas: "header" "main";
        }
        body > header { grid-area: header; }
        body > main { grid-area: main; }

        /* 顶部导航栏：固定 56px 高，main 由 grid 严格排在下方 */
        header {
            height: 56px;
            min-height: 56px;
            background: #fff;
            padding: 0 24px;
            box-shadow: 0 2px 8px rgba(0,0,0,0.05);
            display: flex;
            align-items: center;
            z-index: 100;
        }
        .logo { font-size: 18px; font-weight: bold; color: var(--primary-color); margin-right: 20px; }
        .breadcrumbs { font-size: 14px; color: #666; }
        .breadcrumbs a { color: #666; text-decoration: none; }
        .breadcrumbs a:hover { color: var(--primary-color); }

        /* 主体内容区：仅占 grid 第二行，绝不与顶栏重叠 */
        main { min-height: 0; display: flex; overflow: hidden; position: relative; z-index: 0; }

        /* 状态 1：全局视图 (Markdown 解析区) */
        #global-view { width: 100%; max-width: 800px; margin: 0 auto; padding: 40px 20px; overflow-y: auto; display: none; }
        #global-view.active { display: block; }
        .markdown-body { background: #fff; padding: 30px; border-radius: 8px; box-shadow: 0 2px 12px rgba(0,0,0,0.05); line-height: 1.6; }
        .markdown-body a { color: var(--primary-color); }
        /* 规则区 Markdown 表格：自适应列宽与文字换行 */
        .markdown-body table { width: 100%; border-collapse: collapse; margin: 12px 0; }
        .markdown-body th, .markdown-body td { padding: 10px 12px; border: 1px solid var(--border-color); vertical-align: top; text-align: left; word-break: break-word; overflow-wrap: break-word; }
        .markdown-body th { background: var(--bg-color); font-weight: 600; }
        /* 全局视图表格保留固定列比 */
        #global-view .markdown-body table { table-layout: fixed; }
        #global-view .markdown-body th:first-child, #global-view .markdown-body td:first-child { width: 22%; }
        #global-view .markdown-body th:nth-child(2), #global-view .markdown-body td:nth-child(2) { width: 18%; }
        #global-view .markdown-body th:nth-child(3), #global-view .markdown-body td:nth-child(3) { width: 60%; }
        /* 右侧规则区：表格自适应，长文本换行 */
        .rules-content .markdown-body table { table-layout: auto; max-width: 100%; }
        .rules-content .markdown-body th, .rules-content .markdown-body td { min-width: 60px; max-width: 100%; }

        /* 状态 2：详情拆分视图 (左 UI，右规则) 1:1 布局；整体缩放层默认 90% 避免裁切 */
        #detail-view { width: 100%; display: none; }
        #detail-view.active { display: flex; justify-content: center; align-items: center; }
        #detail-view-zoom-wrap {
            flex: 1;
            min-width: 0;
            min-height: 0;
            display: flex;
            transform-origin: center center;
            transform: scale(0.9);
        }
        
        /* 左侧预览区：仅内容区，缩放为左下方悬浮 */
        .preview-pane { flex: 1; min-width: 0; min-height: 0; display: flex; flex-direction: column; background: #ebedf0; overflow: hidden; position: relative; }
        .preview-iframe-wrap {
            position: relative;
            flex: 1;
            min-height: 0;
            background: #ebedf0;
            display: flex;
            justify-content: center;
            align-items: center;
            overflow: hidden;
        }
        .preview-scale-wrap {
            position: relative;
            width: 100%;
            height: 100%;
            min-width: 100%;
            min-height: 100%;
            transform-origin: center center;
            flex-shrink: 0;
        }
        .preview-scale-wrap iframe { width: 100%; height: 100%; border: none; display: block; }
        /* 左下方悬浮缩放按钮 */
        .preview-zoom-float {
            position: absolute;
            left: 12px;
            bottom: 12px;
            z-index: 20;
            display: flex;
            align-items: center;
            gap: 4px;
            padding: 6px 10px;
            background: rgba(255,255,255,0.95);
            border-radius: 8px;
            box-shadow: 0 2px 12px rgba(0,0,0,0.12);
            font-size: 13px;
            color: #333;
        }
        .preview-zoom-float .zoom-btn {
            width: 28px;
            height: 28px;
            border: 1px solid var(--border-color);
            border-radius: 6px;
            background: #fff;
            cursor: pointer;
            font-size: 16px;
            line-height: 1;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            color: #333;
        }
        .preview-zoom-float .zoom-btn:hover { border-color: var(--primary-color); color: var(--primary-color); background: rgba(241,90,36,0.08); }
        .preview-zoom-float .zoom-value { min-width: 40px; text-align: center; font-weight: 600; }

        /* 右侧规则区：1:1 占比，min-height:0 使内容区可收缩并出现滚动 */
        .rules-pane { flex: 1; min-width: 0; min-height: 0; background: #fff; border-left: 1px solid var(--border-color); display: flex; flex-direction: column; overflow: hidden; }
        .rules-header { flex-shrink: 0; padding: 20px; border-bottom: 1px solid var(--border-color); }
        .rules-header h2 { font-size: 18px; margin-bottom: 4px; }
        .rules-header p { font-size: 12px; color: #999; }
        .rules-content { flex: 1; min-height: 0; overflow-y: auto; overflow-x: hidden; padding: 20px; }
        
        /* 规则卡片样式 */
        .rule-card { background: var(--bg-color); border: 1px solid var(--border-color); border-radius: 8px; padding: 16px; margin-bottom: 16px; transition: all 0.2s; cursor: pointer; scroll-margin: 20px 0; }
        .markdown-body h3[data-zone] { scroll-margin: 20px 0; }
        .rule-card:hover { border-color: var(--primary-color); box-shadow: 0 4px 12px rgba(241, 90, 36, 0.1); }
        .rule-card.zone-highlight, .markdown-body [data-zone].zone-highlight { 
            border: 2px solid var(--primary-color) !important; 
            box-shadow: 0 0 0 3px rgba(241, 90, 36, 0.25), 0 4px 12px rgba(241, 90, 36, 0.15) !important; 
            background: rgba(241, 90, 36, 0.04) !important;
            border-radius: 8px !important;
        }
        
        /* UI 高亮遮罩：左侧 Demo 区域 */
        .ui-highlight-overlay { position: absolute; pointer-events: none; border: 2px solid var(--primary-color); border-radius: 8px; background: rgba(241, 90, 36, 0.08); z-index: 10; transition: all 0.15s ease-out; }
        .rule-badge { display: inline-block; background: #333; color: #fff; font-size: 12px; padding: 2px 8px; border-radius: 4px; margin-bottom: 8px; }
        .rule-title { font-weight: bold; margin-bottom: 12px; font-size: 15px; }
        .rule-steps li { font-size: 13px; color: #555; margin-bottom: 6px; margin-left: 16px; }
        
        /* 错误提示 */
        .error-msg { color: #f5222d; padding: 20px; text-align: center; }
    </style>
</head>
<body>

    <header>
        <div class="logo">SunnyFit PRD</div>
        <div class="breadcrumbs" id="breadcrumbs">等待加载...</div>
    </header>

    <main>
        <div id="global-view">
            <div class="markdown-body" id="global-content">加载中...</div>
        </div>

        <div id="detail-view">
            <div id="detail-view-zoom-wrap">
            <div class="preview-pane">
                <div class="preview-iframe-wrap">
                    <div class="preview-scale-wrap" id="preview-scale-wrap">
                        <iframe id="ui-iframe" src=""></iframe>
                        <div id="ui-highlight-overlay" class="ui-highlight-overlay" style="display:none;"></div>
                    </div>
                </div>
                <div class="preview-zoom-float">
                    <button type="button" class="zoom-btn" id="zoom-out" title="缩小">−</button>
                    <span class="zoom-value" id="zoom-value">90%</span>
                    <button type="button" class="zoom-btn" id="zoom-in" title="放大">+</button>
                </div>
            </div>
            <div class="rules-pane">
                <div class="rules-header">
                    <h2 id="page-title">页面名称加载中...</h2>
                    <p id="page-id-display">ID: ...</p>
                </div>
                <div class="rules-content" id="rules-container">
                    </div>
            </div>
            </div>
        </div>
    </main>

    <script>
        // 解析 URL 参数
        const urlParams = new URLSearchParams(window.location.search);
        const projectUrl = urlParams.get('project');
        const pageId = urlParams.get('page');

        // DOM 元素引用
        const globalView = document.getElementById('global-view');
        const detailView = document.getElementById('detail-view');
        const breadcrumbs = document.getElementById('breadcrumbs');

        // 左侧预览区缩放：档位与默认 90%
        const PREVIEW_ZOOM_LEVELS = [0.5, 0.75, 0.9, 1, 1.1, 1.25];
        let previewZoomIndex = PREVIEW_ZOOM_LEVELS.indexOf(0.9);
        if (previewZoomIndex < 0) previewZoomIndex = 2;

        function getPreviewZoom() { return PREVIEW_ZOOM_LEVELS[previewZoomIndex]; }
        function applyPreviewZoom() {
            const viewWrap = document.getElementById('detail-view-zoom-wrap');
            if (!viewWrap) return;
            const zoom = getPreviewZoom();
            viewWrap.style.transformOrigin = 'center center';
            viewWrap.style.transform = zoom === 1 ? 'none' : 'scale(' + zoom + ')';
        }
        function updateZoomLabel() {
            const el = document.getElementById('zoom-value');
            if (el) el.textContent = Math.round(getPreviewZoom() * 100) + '%';
        }

        // 核心路由控制器
        async function init() {
            if (!projectUrl) {
                globalView.classList.add('active');
                document.getElementById('global-content').innerHTML = `<h2>欢迎使用 PRD Viewer</h2><p>请在 URL 中提供 ?project= 你的仓库地址参数。</p>`;
                breadcrumbs.innerText = "Home";
                return;
            }

            if (!pageId) {
                // 场景 A：只传了 Project，加载全局描述
                await renderGlobalView();
            } else {
                // 场景 B：传了 Project 和 Page，加载详情双栏视图
                await renderDetailView();
            }
        }

	// 渲染全局视图
			async function renderGlobalView() {
				globalView.classList.add('active');
				breadcrumbs.innerHTML = `<span>项目主页</span>`;
				
				try {
					const res = await fetch(`${projectUrl}/global_state_machine.md`);
					if (!res.ok) throw new Error('未找到全局描述文件');
					const markdownText = await res.text();
					
					// 将 Markdown 转换为 HTML
					let htmlContent = marked.parse(markdownText);
					
					// 【修复点】：拦截所有 a 标签，自动补全 project 参数
					globalView.innerHTML = `<div class="markdown-body">${htmlContent}</div>`;
					const links = globalView.querySelectorAll('a');
					links.forEach(link => {
						const href = link.getAttribute('href');
						if (href && href.startsWith('?page=')) {
							// 将 ?page=xxx 替换为 ?project=当前项目&page=xxx
							link.setAttribute('href', `?project=${projectUrl}&${href.substring(1)}`);
						}
					});

				} catch (error) {
					globalView.innerHTML = `<div class="markdown-body"><p class="error-msg">加载全局配置失败: ${error.message}</p></div>`;
				}
			}

        // 渲染页面详情视图
        async function renderDetailView() {
            detailView.classList.add('active');
            breadcrumbs.innerHTML = `<a href="?project=${projectUrl}">项目主页</a> / <span>${pageId}</span>`;
            
            // 页面 ID → 目录名映射（文档用 home/workout_result_light，实际目录为 home_page/workout_result）
            const pageDirMap = { home: 'home_page', workout_result_light: 'workout_result' };
            const pageDir = pageDirMap[pageId] || pageId;

            // 1. 设置左侧 Iframe 路径
            const iframe = document.getElementById('ui-iframe');
            iframe.src = `${projectUrl}/pages/${pageDir}/ui.html`;

            // 2. 拉取并渲染右侧规则（优先 rules.json，若无则尝试 rules.md 合并格式）
            const rulesContainer = document.getElementById('rules-container');
            try {
                let res = await fetch(`${projectUrl}/pages/${pageDir}/rules.json`);
                let rulesData = null;
                if (res.ok) {
                    try {
                        rulesData = await res.json();
                    } catch (_) { rulesData = null; }
                }
                if (rulesData && rulesData.zones) {
                    // JSON 格式：按 zone 逐条渲染
                    document.getElementById('page-title').innerText = rulesData.page_name || '未命名页面';
                    document.getElementById('page-id-display').innerText = `ID: ${pageId}`;
                    let cardsHtml = '';
                    rulesData.zones.forEach(zone => {
                        cardsHtml += `
                            <div class="rule-card" data-zone="${zone.zone_id}">
                                <div class="rule-badge">${zone.module_level || 'Rule'}</div>
                                <div class="rule-title">${zone.module_name || '未命名逻辑区块'}</div>
                                <ul class="rule-steps">
                                    ${zone.logic_steps.map(step => `<li>${step}</li>`).join('')}
                                </ul>
                            </div>
                        `;
                    });
                    rulesContainer.innerHTML = cardsHtml || '<p style="color:#999; font-size:14px;">暂无逻辑配置</p>';
                } else {
                    // Markdown 格式：合并描述，直接渲染
                    res = await fetch(`${projectUrl}/pages/${pageDir}/rules.md`);
                    if (!res.ok) throw new Error('未找到业务规则文件 (rules.json 或 rules.md)');
                    const markdownText = await res.text();
                    const htmlContent = marked.parse(markdownText);
                    document.getElementById('page-title').innerText = pageId;
                    document.getElementById('page-id-display').innerText = `ID: ${pageId}`;
                    rulesContainer.innerHTML = `<div class="markdown-body">${htmlContent}</div>`;
                    // MD 格式：为 h3 添加 data-zone（从标题 [zone_id] 提取），支持规则高亮联动
                    rulesContainer.querySelectorAll('.markdown-body h3').forEach(h3 => {
                        const m = h3.textContent.match(/\[([a-z0-9_]+)\]/i);
                        if (m) h3.setAttribute('data-zone', m[1]);
                    });
                }

            } catch (error) {
                rulesContainer.innerHTML = `<p class="error-msg">解析规则失败: ${error.message}</p>`;
            }

            // 3. 双向高亮联动（规则 ↔ Demo）
            setupBidirectionalHighlight(iframe, rulesContainer);

            // 4. 左侧预览区缩放控件：默认 90%，在父级对整块 iframe 缩放，不注入 iframe 避免裁切
            updateZoomLabel();
            applyPreviewZoom();
            const zoomOutBtn = document.getElementById('zoom-out');
            const zoomInBtn = document.getElementById('zoom-in');
            if (zoomOutBtn) {
                zoomOutBtn.addEventListener('click', () => {
                    if (previewZoomIndex > 0) {
                        previewZoomIndex--;
                        updateZoomLabel();
                        applyPreviewZoom();
                    }
                });
            }
            if (zoomInBtn) {
                zoomInBtn.addEventListener('click', () => {
                    if (previewZoomIndex < PREVIEW_ZOOM_LEVELS.length - 1) {
                        previewZoomIndex++;
                        updateZoomLabel();
                        applyPreviewZoom();
                    }
                });
            }
        }

        // 双向高亮联动：规则 hover → UI 高亮，UI hover → 规则高亮
        function setupBidirectionalHighlight(iframe, rulesContainer) {
            const overlay = document.getElementById('ui-highlight-overlay');
            if (!overlay) return;

            const previewWrap = iframe.closest('.preview-iframe-wrap');
            const rulesContent = rulesContainer.closest('.rules-content');

            // 规则 → UI：hover 规则时高亮对应 UI 元素
            const ruleSelectors = '.rule-card[data-zone], .markdown-body h3[data-zone]';
            rulesContainer.querySelectorAll(ruleSelectors).forEach(el => {
                el.addEventListener('mouseenter', () => {
                    const zoneId = el.getAttribute('data-zone');
                    highlightUI(zoneId, iframe, overlay);
                    el.classList.add('zone-highlight');
                });
                el.addEventListener('mouseleave', () => {
                    overlay.style.display = 'none';
                    rulesContainer.querySelectorAll('.zone-highlight').forEach(e => e.classList.remove('zone-highlight'));
                });
            });

            // UI → 规则：根据左侧 Demo 当前可见内容，自动滚动并高亮右侧对应区块（不依赖 hover）
            // 使用轮询：Demo 为 React 条件渲染，切换步骤时 DOM 会重建，需每次重新查询 zone 元素
            let lastHighlightZone = null;
            let pollTimer = null;
            function updateVisibleZone() {
                try {
                    const doc = iframe.contentDocument;
                    if (!doc || !doc.body) return;
                    const zones = doc.querySelectorAll('[data-zone-id], [data-prd-zone]');
                    if (zones.length === 0) return;
                    const iframeRect = iframe.getBoundingClientRect();
                    let best = { area: 0, zoneId: null };
                    zones.forEach(el => {
                        const rect = el.getBoundingClientRect();
                        const zoneId = el.getAttribute('data-zone-id') || el.getAttribute('data-prd-zone');
                        if (!zoneId) return;
                        const visTop = Math.max(rect.top, iframeRect.top);
                        const visBottom = Math.min(rect.bottom, iframeRect.bottom);
                        const visLeft = Math.max(rect.left, iframeRect.left);
                        const visRight = Math.min(rect.right, iframeRect.right);
                        const area = Math.max(0, visBottom - visTop) * Math.max(0, visRight - visLeft);
                        if (area > best.area) best = { area, zoneId };
                    });
                    if (best.zoneId && best.zoneId !== lastHighlightZone) {
                        lastHighlightZone = best.zoneId;
                        highlightRule(best.zoneId, rulesContainer, rulesContent);
                    }
                } catch (_) { }
            }
            function startVisibleZonePolling() {
                if (pollTimer) clearInterval(pollTimer);
                updateVisibleZone();
                pollTimer = setInterval(updateVisibleZone, 400);
            }
            iframe.addEventListener('load', () => {
                applyPreviewZoom();
                startVisibleZonePolling();
                setTimeout(startVisibleZonePolling, 600);
                setTimeout(startVisibleZonePolling, 1500);
            });

            // 鼠标离开左侧预览区时清除 UI 高亮遮罩（保留右侧规则高亮，因为由可见内容驱动）
            previewWrap?.addEventListener('mouseleave', () => {
                overlay.style.display = 'none';
            });
        }

        function highlightUI(zoneId, iframe, overlay) {
            try {
                const doc = iframe.contentDocument;
                if (!doc) { overlay.style.display = 'none'; return; }
                const el = doc.querySelector(`[data-zone-id="${zoneId}"], [data-prd-zone="${zoneId}"]`);
                if (!el) {
                    // MD 格式：rule 可能是 step 级（plan_create_step_goal），尝试匹配 UI 的 plan_create_goal_*
                    const stepPrefix = zoneId.replace('_step_', '_');
                    const firstMatch = doc.querySelector(`[data-zone-id^="${stepPrefix}"], [data-prd-zone^="${stepPrefix}"]`);
                    if (firstMatch) {
                        showOverlayAt(firstMatch, overlay, iframe);
                        return;
                    }
                    overlay.style.display = 'none';
                    return;
                }
                showOverlayAt(el, overlay, iframe);
            } catch (_) { overlay.style.display = 'none'; }
        }

        function showOverlayAt(el, overlay, iframe) {
            const rect = el.getBoundingClientRect();
            const iframeRect = iframe.getBoundingClientRect();
            overlay.style.left = (rect.left - iframeRect.left) + 'px';
            overlay.style.top = (rect.top - iframeRect.top) + 'px';
            overlay.style.width = rect.width + 'px';
            overlay.style.height = rect.height + 'px';
            overlay.style.display = 'block';
        }

        function highlightRule(zoneId, rulesContainer, rulesContent) {
            rulesContainer.querySelectorAll('.zone-highlight').forEach(e => e.classList.remove('zone-highlight'));
            let ruleEl = rulesContainer.querySelector(`.rule-card[data-zone="${zoneId}"], [data-zone="${zoneId}"]`);
            if (!ruleEl && zoneId) {
                const m = zoneId.match(/^(.+?)_(goal|equip|freq|exclude|coach|cta)_/);
                if (m) {
                    const prefix = m[1];
                    const cat = m[2];
                    const stepCatMap = { goal: 'goal', equip: 'equipment', freq: 'frequency', exclude: 'exclude', coach: 'coach', cta: 'cta' };
                    const stepCat = stepCatMap[cat] || cat;
                    const stepId = prefix + '_step_' + stepCat;
                    ruleEl = rulesContainer.querySelector(`[data-zone="${stepId}"]`);
                }
            }
            if (!ruleEl) {
                ruleEl = rulesContainer.querySelector(`[data-zone*="${zoneId}"]`);
            }
            if (ruleEl) {
                ruleEl.classList.add('zone-highlight');
                const container = rulesContent || rulesContainer;
                const scrolled = container && container.scrollHeight > container.clientHeight;
                if (scrolled) {
                    const elTop = ruleEl.offsetTop;
                    const elH = ruleEl.offsetHeight;
                    const cH = container.clientHeight;
                    const targetScroll = Math.max(0, elTop - Math.floor(cH / 2) + Math.floor(elH / 2));
                    container.scrollTo({ top: targetScroll, behavior: 'smooth' });
                } else {
                    ruleEl.scrollIntoView({ behavior: 'smooth', block: 'center' });
                }
            }
        }

        // 启动应用
        init();
    </script>
</body>
</html>
