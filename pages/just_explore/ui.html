<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunnyFit: Just Explore (SOP 2.0)</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        // SOP 2.0 MapsTo 跨级路由：供本页及子组件调用，统一通过父级 Viewer 切换 page 参数
        function navigateTo(targetPageId) {
            var cleanId = (targetPageId || '').replace(/\.html$/, '');
            var targetFile = cleanId + '.html';
            try {
                if (window.parent !== window && window.parent.location.search.indexOf('page=') !== -1) {
                    var parentParams = new URLSearchParams(window.parent.location.search);
                    parentParams.set('page', cleanId);
                    window.parent.location.search = parentParams.toString();
                    return;
                }
            } catch (e) {}
            if (!window.location.pathname.endsWith(targetFile)) {
                window.location.href = targetFile;
            }
        }
        if (typeof window !== 'undefined') window.navigateTo = navigateTo;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { red: '#EE4343', blue: '#31426D', beige: '#F6E2CF', green: '#2BA471', darkRed: '#8B0000', sky: '#BDD0EB' },
                        bg: { page: '#FFFBF7', card: '#FFFFFF', neutral: '#F5F7FA' },
                        text: { primary: '#31426D', secondary: '#666666' }
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    boxShadow: {
                        'glow': '0px 10px 30px rgba(222, 37, 41, 0.4)',
                        'float-btn': '0px 10px 20px rgba(17, 17, 17, 0.2)',
                        'card': '0px 4px 20px rgba(0,0,0,0.05)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'breathe': 'breathe 4s ease-in-out infinite',
                        'pop': 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                        'slide-in': 'slideIn 0.4s ease-out forwards',
                        'pulse-fast': 'pulse 1s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                    },
                    keyframes: {
                        fadeUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        breathe: {
                            '0%, 100%': { transform: 'scale(1)', filter: 'drop-shadow(0px 10px 20px rgba(222, 37, 41, 0.3))' },
                            '50%': { transform: 'scale(1.05)', filter: 'drop-shadow(0px 15px 30px rgba(222, 37, 41, 0.5))' }
                        },
                        pop: { '0%': { transform: 'scale(0.95)' }, '50%': { transform: 'scale(1.02)' }, '100%': { transform: 'scale(1)' } },
                        slideIn: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: auto; font-family: 'Montserrat', sans-serif; }
        .mobile-viewport { width: 390px; min-height: 844px; background-color: #FFFBF7; position: relative; overflow: hidden; border-radius: 40px; border: 8px solid #333; box-shadow: 0px 30px 60px rgba(0,0,0,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState } = React;

        const SCENES = {
            stressed: {
                id: 'stressed', label: 'Stressed', icon: '😫',
                dialogueTitle: "I hear you. It's been a long day, right?",
                courseTitle: "8-Min Stress Relief Flow",
                courseTag: "Yoga • 🧘 Low Impact",
                image: "https://images.unsplash.com/photo-1599058945522-28d584b6f0ff?auto=format&fit=crop&w=600&q=80",
            },
            tired: {
                id: 'tired', label: 'Tired', icon: '🥱',
                // 修复了这里的引号缺失问题
                dialogueTitle: 'Low energy? That\'s okay. We can work with that.',
                courseTitle: '5-Min Bedtime Stretch',
                courseTag: 'Stretch • 🌙 Relax',
                image: "https://images.unsplash.com/photo-1544367563-12123d8965cd?auto=format&fit=crop&w=600&q=80",
            },
            stiff: {
                id: 'stiff', label: 'Stiff', icon: '🤕',
                dialogueTitle: "Office shoulders? Let's fix that.",
                courseTitle: "Neck & Shoulder Release",
                courseTag: "Mobility • 💆 Relief",
                image: "https://images.unsplash.com/photo-1571019614242-c5c5dee9f50b?auto=format&fit=crop&w=600&q=80",
            },
            energetic: {
                id: 'energetic', label: 'Energetic', icon: '🔥',
                dialogueTitle: "Love the energy! Let's put it to good use.",
                courseTitle: "10-Min Full Body Tone",
                courseTag: "HIIT • ⚡ High Intensity",
                image: "https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=600&q=80",
            }
        };

        const Icons = {
            ChevronLeft: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>,
        };

        const SunnyLogo = () => (
            <div className="w-[88px] h-[88px] flex items-center justify-center animate-breathe">
                <svg viewBox="0 0 32 32" fill="none" className="w-full h-full drop-shadow-glow">
                    <path d="M16.013 32C13.271 31.9018 10.5412 31.8755 7.87463 31.1231C3.57228 29.9252 1.23878 26.956 0.52873 22.6889C-0.165498 18.3226 -0.176144 13.8749 0.497173 9.50531C1.23001 4.58405 4.38577 1.32017 9.29472 0.537958C13.609 -0.165525 18.0077 -0.17914 22.3262 0.497619C27.7401 1.35875 30.6837 4.27187 31.513 9.76137C32.1817 14.0582 32.1521 18.4348 31.4253 22.7222C30.5207 27.9048 27.3527 30.867 22.079 31.558C20.0716 31.8176 18.0362 31.8597 16.013 32Z" fill="#EE4343" />
                    <path d="M15.3836 6.16027C15.9406 6.15315 16.4468 6.48357 16.6646 6.99654C16.8824 7.50952 16.7687 8.10332 16.3767 8.49943C15.9848 8.89555 15.3925 9.01542 14.8774 8.80283C14.3624 8.59024 14.027 8.08735 14.0283 7.53001C14.0358 6.78206 14.636 6.1754 15.3836 6.16027Z" fill="#FFFFFF" />
                    <path d="M19.6492 11.387C18.5149 11.7676 17.3455 12.0377 16.2287 12.4744C15.8322 12.6166 15.4556 12.8094 15.1084 13.0479C13.9776 13.8722 13.939 14.9315 14.9611 15.9768C15.7606 16.7959 16.7231 17.4115 17.5769 18.1586C18.9041 19.3214 18.9637 20.5245 17.7312 21.8118C16.4829 23.1255 14.905 23.9726 13.2676 24.6811C12.5908 24.974 11.8983 25.2283 11.2128 25.5002C11.0314 25.3255 10.9531 25.0694 11.0059 24.8232C12.0619 24.4117 13.0326 23.8082 13.8689 23.043C14.3759 22.5899 14.8315 22.0823 15.2276 21.5295C16.092 20.3018 16.0446 19.5722 15.0523 18.4445C14.3405 17.6412 13.5095 16.945 12.9134 16.0365C11.7317 14.2335 12.2928 12.0623 14.1722 10.9977C15.6747 10.1471 17.2876 9.58586 18.9234 9.06848C19.6106 8.85451 20.1226 9.11759 20.3259 9.7402C20.5766 10.5312 20.34 11.159 19.6492 11.387Z" fill="#FFFFFF" />
                </svg>
            </div>
        );

        const JustExploreFlow = () => {
            const [step, setStep] = useState(1);
            const [selectedScene, setSelectedScene] = useState(null);
            const [isSyncing, setIsSyncing] = useState(false);

            const handleMoodSelect = (key) => {
                setSelectedScene(SCENES[key]);
                setStep(2);
            };

            const handleBack = () => {
                if (step === 2) {
                    setStep(1);
                    setSelectedScene(null);
                } else {
                    if (typeof window.navigateTo === 'function') window.navigateTo('intent_select');
                }
            };

            const handleSyncAndStart = () => {
                setIsSyncing(true);
                setTimeout(() => {
                    setIsSyncing(false);
                    if (typeof window.navigateTo === 'function') window.navigateTo('first_ride');
                    else alert("✅ Sync success!");
                }, 1500);
            };

            // 手动输入信息入口
            const handleSkip = () => {
                if (typeof window.navigateTo === 'function') window.navigateTo('manual_entry'); // 假定跳转到手动填写页
                else alert("跳转到：手动生理信息填写表单");
            };

            return (
                <div className="mobile-viewport bg-bg-page flex flex-col font-sans text-text-primary">
                    <div className="px-6 pt-10 pb-4 flex items-center shrink-0" data-zone-id="just_explore_header" data-prd-zone="just_explore_header">
                        <button onClick={handleBack} className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue active:scale-95" aria-label="Back">
                            <Icons.ChevronLeft />
                        </button>
                    </div>

                    <div className="flex-1 flex flex-col overflow-y-auto no-scrollbar relative min-h-0">
                        {step === 1 && (
                            <div className="animate-fade-up px-6 pb-8" data-zone-id="just_explore_step1_mood" data-prd-zone="just_explore_step1_mood">
                                <div className="flex flex-col items-center pt-2 px-4 text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-3">No pressure. Just flow.</h3>
                                    <p className="text-[14px] text-text-secondary leading-relaxed">
                                        Whether you want to sweat or just breathe, let's start with how your body feels right now.
                                    </p>
                                </div>
                                <div className="mt-8">
                                    <div className="grid grid-cols-2 gap-3">
                                        {Object.values(SCENES).map((mood) => (
                                            <div key={mood.id} onClick={() => handleMoodSelect(mood.id)} className="p-5 rounded-[24px] border-2 border-transparent bg-white shadow-card hover:shadow-md active:scale-95 transition-all flex flex-col items-center gap-3 cursor-pointer h-36 justify-center" data-zone-id={`just_explore_mood_${mood.id}`} data-prd-zone={`just_explore_mood_${mood.id}`}>
                                                <span className="text-4xl animate-pop" style={{ animationDelay: '0.1s' }}>{mood.icon}</span>
                                                <h4 className="font-bold text-[15px] text-text-primary">{mood.label}</h4>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 2 && selectedScene && (
                            <>
                                <div className="animate-slide-in px-6 pb-6 flex-1" data-zone-id="just_explore_step2_recommend" data-prd-zone="just_explore_step2_recommend">
                                    <div className="flex flex-col items-center pt-2 px-4 text-center">
                                        <div className="mb-6"><SunnyLogo /></div>
                                        <h3 className="text-[22px] font-bold text-brand-blue leading-tight mt-2 mb-4">"{selectedScene.dialogueTitle}"</h3>
                                        {/* 移除了 dialogueBody 渲染，界面更加清爽 */}
                                    </div>
                                    <div className="mt-4">
                                        <div className="flex items-center gap-3 mb-4 opacity-50">
                                            <div className="h-[1px] flex-1 bg-brand-red"></div>
                                            <span className="text-[10px] font-bold text-brand-red uppercase tracking-widest">Recommended For You</span>
                                            <div className="h-[1px] flex-1 bg-brand-red"></div>
                                        </div>
                                        <div className="bg-white rounded-[28px] shadow-float-btn overflow-hidden border border-gray-100 animate-pop">
                                            <div className="h-[160px] bg-cover bg-center relative" style={{ backgroundImage: `url('${selectedScene.image}')` }}>
                                                <div className="absolute inset-0 bg-gradient-to-t from-black/60 to-transparent"></div>
                                                <div className="absolute bottom-4 left-4 text-white">
                                                    <h3 className="font-bold text-[20px] leading-tight text-white">{selectedScene.courseTitle}</h3>
                                                </div>
                                            </div>
                                            <div className="p-5 flex items-center justify-between">
                                                <p className="text-[12px] text-text-secondary font-bold uppercase tracking-wide">{selectedScene.courseTag}</p>
                                                <div className="w-10 h-10 rounded-full bg-brand-red text-white flex items-center justify-center shadow-md">
                                                    <svg className="w-5 h-5" fill="currentColor" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                </div>

                                <div className="px-6 pb-8 pt-4 bg-gradient-to-t from-bg-page via-bg-page to-transparent shrink-0 z-50 animate-slide-in" data-zone-id="just_explore_cta" data-prd-zone="just_explore_cta">
                                    <div className="mb-4 text-center">
                                        <p className="text-[12px] text-text-secondary font-medium px-4 leading-relaxed">
                                            To ensure the intensity is perfectly safe for your current state, please sync your basic stats.
                                        </p>
                                    </div>
                                    <button
                                        onClick={handleSyncAndStart}
                                        disabled={isSyncing}
                                        className={`w-full py-4 bg-[#111111] text-white rounded-[16px] font-bold shadow-float-btn transition-all flex items-center justify-center gap-2 mb-4 ${isSyncing ? 'opacity-80' : 'active:scale-95'}`}
                                        data-zone-id="just_explore_cta_sync_start"
                                        data-prd-zone="just_explore_cta_sync_start"
                                    >
                                        {isSyncing ? (
                                            <span className="animate-pulse-fast tracking-wide">Syncing Data...</span>
                                        ) : (
                                            <>
                                                <span className="text-[#ff2d55] text-lg">❤️</span>
                                                <span>Quick Sync & Start</span>
                                            </>
                                        )}
                                    </button>
                                    <button
                                        onClick={handleSkip}
                                        disabled={isSyncing}
                                        className="w-full py-2 text-[13px] text-text-secondary font-semibold active:scale-95 transition-transform underline decoration-gray-300 underline-offset-4"
                                        data-zone-id="just_explore_cta_manual"
                                        data-prd-zone="just_explore_cta_manual"
                                    >
                                        Enter Manually
                                    </button>
                                </div>
                            </>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<JustExploreFlow />);
    </script>
</body>
</html>
