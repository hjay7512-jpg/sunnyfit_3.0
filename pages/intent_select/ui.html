<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">

  <title>SunnyFit: Intent Select (SOP 2.0)</title>

  <script>
    (function() {
      try { window.localStorage.getItem('test_probe'); } catch (e) {
        var store = {};
        Object.defineProperty(window, 'localStorage', {
          value: {
            getItem: function(k) { return store[k] || null; },
            setItem: function(k, v) { store[k] = String(v); },
            removeItem: function(k) { delete store[k]; },
            clear: function() { store = {}; },
            key: function(i) { return Object.keys(store)[i] || null; },
            get length() { return Object.keys(store).length; }
          }, writable: true, configurable: true
        });
      }
    })();
  </script>
  <script>
    document.addEventListener('click', function(e) {
      if (e.ctrlKey && e.altKey) {
        e.preventDefault(); e.stopPropagation();
        var t = e.target, sel = t.tagName.toLowerCase();
        if (t.id) sel += '#' + t.id;
        else if (t.className && typeof t.className === 'string' && t.className.trim()) sel += '.' + t.className.trim().split(' ')[0];
        window.parent.postMessage({ type: 'REQ_ANNOTATE', x: e.clientX, y: e.clientY, selector: sel }, '*');
      }
    }, true);
  </script>

  <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
  <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>

  <script>
      // SOP 2.0 MapsTo 跨级路由：供本页及子组件调用，统一通过父级 Viewer 切换 page 参数
      function navigateTo(targetPageId) {
          var cleanId = (targetPageId || '').replace(/\.html$/, '');
          var targetFile = cleanId + '.html';
          try {
              if (window.parent !== window && window.parent.location.search.indexOf('page=') !== -1) {
                  var parentParams = new URLSearchParams(window.parent.location.search);
                  parentParams.set('page', cleanId);
                  window.parent.location.search = parentParams.toString();
                  return;
              }
          } catch (e) {}
          if (!window.location.pathname.endsWith(targetFile)) {
              window.location.href = targetFile;
          }
      }
      if (typeof window !== 'undefined') window.navigateTo = navigateTo;
  </script>

  <script>
      tailwind.config = {

                      slideIn: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                      slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } },
                      scaleIn: { '0%': { opacity: '0', transform: 'scale(0.9)' }, '100%': { opacity: '1', transform: 'scale(1)' } }
                  }
              }
          }
      }

  <style>
      * { -webkit-tap-highlight-color: transparent; box-sizing: border-box; }
      body { 
          margin: 0; background-color: #f0f0f0; display: flex; 
          justify-content: center; align-items: center; height: 100vh; overflow: hidden;
          font-family: 'Montserrat', sans-serif;
      }
      .mobile-viewport {
          width: 390px; height: 844px; background-color: #FFFBF7; position: relative;
          overflow: hidden; border-radius: 40px; border: 8px solid #333;
          box-shadow: 0px 30px 60px rgba(0,0,0,0.3);
      }
      .no-scrollbar::-webkit-scrollbar { display: none; }
      .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
      
      /* Custom input styles */
      .custom-input {
          width: 100%; height: 56px; background: white; border: 2px solid transparent;
          border-radius: 16px; padding: 0 20px; font-size: 15px; font-weight: 500;
          color: #31426D; outline: none; transition: all 0.3s ease;
          box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.08);
      }
      .custom-input:focus { border-color: #EE4343; box-shadow: 0px 4px 16px rgba(238, 67, 67, 0.15); }
      .custom-input::placeholder { color: #999; }
      
      /* Social login button */
      .social-btn {
          width: 100%; height: 52px; background: white; border-radius: 16px;
          display: flex; align-items: center; justify-content: center; gap: 12px;
          font-size: 15px; font-weight: 600; color: #31426D;
          box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.08);
          cursor: pointer; transition: all 0.2s ease; border: none;
      }
      .social-btn:hover { transform: translateY(-2px); box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.12); }
      .social-btn:active { transform: scale(0.98); }
      
      /* Country card */
      .country-card {
          display: flex; align-items: center; gap: 12px; padding: 16px;
          background: white; border-radius: 16px; border: 2px solid transparent;
          cursor: pointer; transition: all 0.2s ease;
          box-shadow: 0px 2px 8px rgba(0, 0, 0, 0.06);
      }
      .country-card:hover { border-color: #EE4343; transform: translateY(-2px); }
      .country-card.selected { border-color: #EE4343; background: rgba(238, 67, 67, 0.05); }
      
      /* Coach card */
      .coach-card {
          background: white; border-radius: 24px; padding: 20px;
          border: 2px solid transparent; cursor: pointer; transition: all 0.3s ease;
          box-shadow: 0px 4px 12px rgba(0, 0, 0, 0.06);
      }
      .coach-card:hover { transform: translateY(-4px); box-shadow: 0px 8px 24px rgba(0, 0, 0, 0.1); }
      .coach-card.selected { border-color: #EE4343; background: rgba(238, 67, 67, 0.05); }
      
      /* Divider */
      .divider {
          display: flex; align-items: center; gap: 16px;
          color: #999; font-size: 13px;
      }
      .divider::before, .divider::after {
          content: ''; flex: 1; height: 1px; background: #e0e0e0;
      }
      
      /* Bottom sheet */
      .bottom-sheet-overlay {
          position: fixed; inset: 0; background: rgba(0, 0, 0, 0.5);
          opacity: 0; visibility: hidden; transition: all 0.3s ease; z-index: 50;
      }
      .bottom-sheet-overlay.active { opacity: 1; visibility: visible; }
      
      .bottom-sheet {
          position: absolute; bottom: 0; left: 0; right: 0;
          background: white; border-radius: 24px 24px 0 0;
          padding: 24px; max-height: 70vh; overflow-y: auto;
          transform: translateY(100%); transition: transform 0.4s cubic-bezier(0.16, 1, 0.3, 1);
      }
      .bottom-sheet.active { transform: translateY(0); }
      
      /* Floating emoji */
      @keyframes float {
          0%, 100% { transform: translateY(0px); }
          50% { transform: translateY(-10px); }
      }
      .float-emoji { animation: float 3s ease-in-out infinite; }
  </style>
</head>

          return COUNTRIES.find(c => c.code === countryCode) || COUNTRIES[0];

                      onClick={onNext}
                      disabled={!email || !email.includes('@')}
                      className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                  >
                      Continue
                  </button>
              </div>
          </div>
      );

      // Password Step
      const PasswordStep = ({ password, onChange, onNext, onBack }) => (
          <div className="animate-fade-up px-6 pt-12" data-zone-id="intent_select_step_password" data-prd-zone="intent_select_step_password">
              <button onClick={onBack} className="mb-6 w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue active:scale-95 transition-all">
                  <Icons.ChevronLeft />
              </button>
              
              <div className="mb-8">
                  <h2 className="text-[24px] font-bold text-text-primary">Create a password</h2>
                  <p className="text-[14px] text-text-secondary mt-2">Keep your account secure</p>
              </div>
              
              <div className="space-y-4">
                  <div className="relative">
                      <div className="absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary">
                          <Icons.Lock />
                      </div>
                      <input
                          type="password"
                          value={password}
                          onChange={(e) => onChange(e.target.value)}
                          placeholder="Min 6 characters"
                          className="custom-input pl-12"
                          autoFocus
                      />
                  </div>
                  
                  <div className="flex items-center gap-2 text-[12px] text-text-secondary">
                      <div className={`w-2 h-2 rounded-full ${password.length >= 6 ? 'bg-brand-green' : 'bg-gray-300'}`} />
                      <span>At least 6 characters</span>
                  </div>
                  
                  <button
                      onClick={onNext}
                      disabled={password.length < 6}
                      className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                  >
                      Continue
                  </button>
              </div>
          </div>
      );

      // Privacy & Country Step with Bottom Sheet
      const PrivacyStep = ({ country, onSelect, unit, onUnitChange, onNext, onBack }) => {
          const [showSheet, setShowSheet] = useState(false);

          return (
              <div className="animate-fade-up px-6 pt-12 h-full flex flex-col" data-zone-id="intent_select_step_privacy" data-prd-zone="intent_select_step_privacy">
                  <button onClick={onBack} className="mb-6 w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue active:scale-95 transition-all">
                      <Icons.ChevronLeft />
                  </button>

                  <div className="mb-6">
                      <h2 className="text-[24px] font-bold text-text-primary leading-tight">Privacy & Region</h2>
                      <p className="text-[14px] text-text-secondary mt-3 leading-relaxed">
                          We value your privacy and let you control how your data is used. Confirm your country/region to set the right privacy options.
                      </p>
                  </div>

                  <div className="space-y-5">
                      {/* Country Selection */}
                      <div className="space-y-3">
                          <p className="text-[12px] font-bold text-text-secondary uppercase tracking-widest">Your region</p>

                          <button
                              onClick={() => setShowSheet(true)}
                              className="w-full flex items-center justify-between p-4 bg-white rounded-[16px] shadow-input border-2 border-transparent hover:border-brand-red transition-all"
                          >
                              <div className="flex items-center gap-3">
                                  <span className="text-2xl">{country?.flag}</span>
                                  <span className="font-semibold text-[15px] text-text-primary">{country?.name}</span>
                              </div>
                              <Icons.ChevronRight />
                          </button>

                          <p className="text-[12px] text-text-secondary">
                              Auto-detected from your location. Tap to change.
                          </p>
                      </div>

                      {/* Unit System Selection */}
                      <div className="space-y-3">
                          <p className="text-[12px] font-bold text-text-secondary uppercase tracking-widest">Unit System</p>

                          <div className="flex gap-3">
                              <button
                                  onClick={() => onUnitChange('metric')}
                                  className={`flex-1 p-4 rounded-[16px] border-2 transition-all ${unit === 'metric' ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-input'}`}
                              >
                                  <div className="text-center">
                                      <div className="text-2xl mb-1">📏</div>
                                      <div className="font-semibold text-[14px] text-text-primary">Metric</div>
                                      <div className="text-[11px] text-text-secondary">kg / cm / km</div>
                                  </div>
                              </button>

                              <button
                                  onClick={() => onUnitChange('imperial')}
                                  className={`flex-1 p-4 rounded-[16px] border-2 transition-all ${unit === 'imperial' ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-input'}`}
                              >
                                  <div className="text-center">
                                      <div className="text-2xl mb-1">📐</div>
                                      <div className="font-semibold text-[14px] text-text-primary">Imperial</div>
                                      <div className="text-[11px] text-text-secondary">lb / ft / mi</div>
                                  </div>
                              </button>
                          </div>
                      </div>
                  </div>

                  <div className="flex-1"></div>

                  <div className="py-6">
                      <button
                          onClick={onNext}
                          className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all"
                      >
                          Continue
                      </button>
                      <p className="text-center text-[11px] text-text-secondary mt-4">
                          You can change this anytime in your profile settings
                      </p>
                  </div>

                  {/* Country Bottom Sheet */}
                  <div className={`bottom-sheet-overlay ${showSheet ? 'active' : ''}`} onClick={() => setShowSheet(false)}>
                      <div className={`bottom-sheet ${showSheet ? 'active' : ''}`} onClick={e => e.stopPropagation()}>
                          <div className="flex items-center justify-between mb-4">
                              <h3 className="text-[18px] font-bold text-text-primary">Select Country</h3>
                              <button onClick={() => setShowSheet(false)} className="p-2">
                                  <Icons.Close />
                              </button>
                          </div>
                          <div className="space-y-2 max-h-[50vh] overflow-y-auto no-scrollbar pb-4">
                              {COUNTRIES.map((c) => (
                                  <div
                                      key={c.code}
                                      onClick={() => { onSelect(c); setShowSheet(false); }}
                                      className={`flex items-center gap-3 p-3 rounded-[12px] cursor-pointer transition-all ${country?.code === c.code ? 'bg-brand-red/10' : 'hover:bg-gray-100'}`}
                                  >
                                      <span className="text-2xl">{c.flag}</span>
                                      <span className="font-medium text-[15px] text-text-primary flex-1">{c.name}</span>
                                      {country?.code === c.code && <div className="text-brand-red"><Icons.Check /></div>}
                                  </div>
                              ))}
                          </div>
                      </div>
                  </div>
              </div>
          );
      };

      // Nickname Step
      const NicknameStep = ({ nickname, onChange, onNext, onBack }) => (
          <div className="animate-fade-up px-6 pt-12" data-zone-id="intent_select_step_nickname" data-prd-zone="intent_select_step_nickname">
              <button onClick={onBack} className="mb-6 w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue active:scale-95 transition-all">
                  <Icons.ChevronLeft />
              </button>
              
              <div className="mb-8">
                  <h2 className="text-[24px] font-bold text-text-primary">What should we call you?</h2>
                  <p className="text-[14px] text-text-secondary mt-2">This is how your coach will address you</p>
              </div>
              
              <div className="space-y-6">
                  <div className="relative">
                      <div className="absolute left-4 top-1/2 -translate-y-1/2 text-text-secondary">
                          <Icons.User />
                      </div>
                      <input
                          type="text"
                          value={nickname}
                          onChange={(e) => onChange(e.target.value)}
                          placeholder="Enter your nickname"
                          className="custom-input pl-12"
                          maxLength={20}
                          autoFocus
                      />
                  </div>
                  
                  <div className="text-center py-4">

                  </div>
                  
                  <button
                      onClick={onNext}
                      disabled={!nickname.trim()}
                      className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed"
                  >
                      Continue
                  </button>
              </div>
          </div>
      );

      // Coach Selection Step with Breathing Logo Chat Style
      const CoachSelectStep = ({ selectedCoach, onSelect, onComplete, onBack, nickname }) => {
          const [showIntentions, setShowIntentions] = React.useState(false);

          return (
          <div className="animate-fade-up px-6 pt-6 h-full flex flex-col" data-zone-id="intent_select_step_coach" data-prd-zone="intent_select_step_coach">
              <button onClick={onBack} className="mb-4 w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue active:scale-95 transition-all">
                  <Icons.ChevronLeft />
              </button>

              {/* Coach avatar centered with breathe animation */}
              <div className="flex flex-col items-center mb-7 mt-0">
                  <div className="w-20 h-20 rounded-full flex items-center justify-center bg-brand-blue text-white text-4xl animate-breathe shadow-lg mb-4">
                      <SunnyLogo />
                  </div>
                  <h2 className="text-[22px] text-text-primary text-center font-bold mb-3">
                      {nickname ? `Hi, ${nickname}` : 'Hi there'}
                  </h2>
                  <div className="max-w-[280px] mx-auto">
                      <div className="chat-bubble mx-auto">
                          <span className="text-[15px] text-text-primary leading-relaxed">
                              Consistency is the only challenge. Who do you want by your side?
                          </span>
                      </div>
                  </div>
              </div>

              <div className="flex-1 overflow-y-auto no-scrollbar py-2 space-y-3">
                  {COACHES.map((coach) => (
                      <div
                          key={coach.id}
                          onClick={() => onSelect(coach)}
                          className={`coach-card ${selectedCoach?.id === coach.id ? 'selected' : ''}`}
                          data-zone-id={`intent_select_coach_${coach.id}`}
                          data-prd-zone={`intent_select_coach_${coach.id}`}
                      >
                          <div className="flex items-start gap-4">
                              <div className={`w-14 h-14 rounded-full flex items-center justify-center text-3xl float-emoji ${coach.color} text-white shadow-md`}>
                                  {coach.avatar}
                              </div>
                              <div className="flex-1">
                                  <div className="flex items-center gap-2 mb-1">
                                      <h3 className="font-bold text-[16px] text-text-primary">{coach.name}</h3>
                                      <span className="text-[10px] bg-bg-neutral px-2 py-0.5 rounded text-text-secondary font-bold uppercase tracking-wide">
                                          {coach.title}
                                      </span>
                                  </div>
                                  <p className="text-[13px] text-text-secondary italic leading-snug">
                                      "{coach.quote}"
                                  </p>
                              </div>
                              {selectedCoach?.id === coach.id && (
                                  <div className="text-brand-red mt-1">
                                      <Icons.Check />
                                  </div>
                              )}
                          </div>
                      </div>
                  ))}
              </div>

              {/* "Intentions" Full Page Step After Coach Selection */}
              {!showIntentions ? (
                  <div className="py-4 bg-gradient-to-t from-bg-page to-transparent">
                      <button
                          onClick={() => {
                              if (!selectedCoach) return;
                              setShowIntentions(true);
                          }}
                          disabled={!selectedCoach}
                          className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-40 disabled:cursor-not-allowed animate-scale-in"
                          data-zone-id="intent_select_cta_start_journey"
                          data-prd-zone="intent_select_cta_start_journey"
                      >
                          Start My Journey
                      </button>
                  </div>
              ) : (
                  <div className="fixed inset-0 z-40 bg-bg-page flex flex-col items-center justify-center px-4 py-10 animate-fade-in" data-zone-id="intent_select_intentions" data-prd-zone="intent_select_intentions">
                      <div className="flex flex-col items-center mb-8">
                          <div className={`w-20 h-20 rounded-full flex items-center justify-center ${selectedCoach?.color} text-white text-4xl shadow-lg mb-5`}>
                              {selectedCoach?.avatar}
                          </div>
                          <h2 className="text-[22px] text-text-primary text-center font-bold mb-2">
                              Great! What do you want to start?
                          </h2>
                          <p className="text-[15px] text-text-secondary text-center mb-1 font-medium">
                              Let's do it first.
                          </p>
                      </div>
                      <div className="w-full max-w-[380px] flex flex-col gap-4">
                          {/* Option 1: Connect Equipment */}
                          <button
                              type="button"
                              data-zone-id="intent_select_opt_device_connect"
                              data-prd-zone="intent_select_opt_device_connect"
                              className="flex items-center gap-3 p-4 bg-white rounded-xl shadow-md border border-bg-neutral hover:shadow-lg transition"
                              onClick={e => {
                                  e.preventDefault();
                                  e.stopPropagation();
                                  try {
                                      sessionStorage.setItem('sunnyfit_user', JSON.stringify({
                                          nickname,
                                          coach: selectedCoach
                                      }));
                                  } catch (err) {}
                                  if (typeof window.navigateTo === 'function') {
                                      window.navigateTo('device_connect');
                                  } else {
                                      window.location.href = 'device_connect.html';
                                  }
                              }}
                          >
                              <span className="flex-shrink-0 w-10 h-10 rounded-full bg-brand-blue text-white flex items-center justify-center text-2xl font-bold shadow">
                                  <i className="icon-[mdi--connection]"></i>
                              </span>
                              <div className="flex-1 text-left">
                                  <div className="font-bold text-[16px] text-text-primary mb-0.5">Connect Equipment</div>
                                  <div className="text-[13px] text-text-secondary">Connect your Sunny or JLL equipment</div>
                              </div>
                          </button>
                          {/* Option 2: Find Workout Guide */}
                          <button
                              type="button"
                              data-zone-id="intent_select_opt_plan_create"
                              data-prd-zone="intent_select_opt_plan_create"
                              className="flex items-center gap-3 p-4 bg-white rounded-xl shadow-md border border-bg-neutral hover:shadow-lg transition"
                              onClick={e => {
                                  e.preventDefault();
                                  e.stopPropagation();
                                  try {
                                      sessionStorage.setItem('sunnyfit_user', JSON.stringify({
                                          nickname,
                                          coach: selectedCoach
                                      }));
                                  } catch (err) {}
                                  if (typeof window.navigateTo === 'function') {
                                      window.navigateTo('plan_create');
                                  } else {
                                      window.location.href = 'plan_create.html';
                                  }
                              }}
                          >
                              <span className="flex-shrink-0 w-10 h-10 rounded-full bg-brand-yellow text-white flex items-center justify-center text-2xl font-bold shadow">
                                  <i className="icon-[mdi--dumbbell]"></i>
                              </span>
                              <div className="flex-1 text-left">
                                  <div className="font-bold text-[16px] text-text-primary mb-0.5">Find Workout Guide</div>
                                  <div className="text-[13px] text-text-secondary">Looking for workouts suit for me</div>
                              </div>
                          </button>
                          {/* Option 3: Just Browsing */}
                          <button
                              type="button"
                              data-zone-id="intent_select_opt_just_explore"
                              data-prd-zone="intent_select_opt_just_explore"
                              className="flex items-center gap-3 p-4 bg-white rounded-xl shadow-md border border-bg-neutral hover:shadow-lg transition"
                              onClick={e => {
                                  e.preventDefault();
                                  e.stopPropagation();
                                  try {
                                      sessionStorage.setItem('sunnyfit_user', JSON.stringify({
                                          nickname,
                                          coach: selectedCoach
                                      }));
                                  } catch (err) {}
                                  if (typeof window.navigateTo === 'function') {
                                      window.navigateTo('just_explore');
                                  } else {
                                      window.location.href = 'just_explore.html';
                                  }
                              }}
                          >
                              <span className="flex-shrink-0 w-10 h-10 rounded-full bg-brand-red text-white flex items-center justify-center text-2xl font-bold shadow">
                                  <i className="icon-[mdi--emoticon-happy-outline]"></i>
                              </span>
                              <div className="flex-1 text-left">
                                  <div className="font-bold text-[16px] text-text-primary mb-0.5">Just Browsing</div>
                                  <div className="text-[13px] text-text-secondary">Looking for something fun</div>
                              </div>
                          </button>
                      </div>
                  </div>
              )}
          </div>
          );
      };

      // Main App
      const App = () => {
          const [appState, setAppState] = useState('splash');
          const [step, setStep] = useState(1);
          const [formData, setFormData] = useState({
              email: '',
              password: '',
              country: null,
              unit: 'metric', // Default to metric
              nickname: '',
              coach: null
          });

          // Set default country on mount
          useEffect(() => {
              setFormData(prev => ({ ...prev, country: getDefaultCountry() }));
          }, []);

          const handleSplashComplete = () => {
              setAppState('registration');
          };

          const updateField = (field, value) => {
              setFormData(prev => ({ ...prev, [field]: value }));
          };

          const nextStep = () => setStep(step + 1);
          const prevStep = () => setStep(step - 1);
          const goToEmail = () => setStep(2);
          const backToSocial = () => setStep(1);

          const handleComplete = () => {
              // Store user data with coach info for next pages
              sessionStorage.setItem('sunnyfit_user', JSON.stringify({
                  nickname: formData.nickname,
                  coach: formData.coach,
                  email: formData.email,
                  country: formData.country
              }));
              
              // Navigate to coach guide page
              window.navigateTo('coach_guide');
          };

          const renderStep = () => {
              switch (step) {
                  case 1:
                      return (
                          <SocialLoginStep
                              email={formData.email}
                              onEmailChange={(val) => updateField('email', val)}
                              onNext={nextStep}
                              onSocialLogin={(provider) => {
                                  setStep(4);
                              }}
                          />
                      );
                  case 2:
                      return (
                          <EmailStep
                              email={formData.email}
                              onChange={(val) => updateField('email', val)}
                              onNext={nextStep}
                              onBack={backToSocial}
                          />
                      );
                  case 3:
                      return (
                          <PasswordStep
                              password={formData.password}
                              onChange={(val) => updateField('password', val)}
                              onNext={nextStep}
                              onBack={prevStep}
                          />
                      );
                  case 4:
                      return (
                          <PrivacyStep
                              country={formData.country}
                              onSelect={(country) => updateField('country', country)}
                              unit={formData.unit}
                              onUnitChange={(unit) => updateField('unit', unit)}
                              onNext={nextStep}
                              onBack={prevStep}
                          />
                      );
                  case 5:
                      return (
                          <NicknameStep
                              nickname={formData.nickname}
                              onChange={(val) => updateField('nickname', val)}
                              onNext={nextStep}
                              onBack={prevStep}
                          />
                      );
                  case 6:
                      return (
                          <CoachSelectStep
                              selectedCoach={formData.coach}
                              onSelect={(coach) => updateField('coach', coach)}
                              onComplete={handleComplete}
                              onBack={prevStep}
                              nickname={formData.nickname}
                          />
                      );
                  default:
                      return null;
              }
          };

          return (
              <div className="mobile-viewport font-sans">
                  {appState === 'splash' && <SplashScreen onComplete={handleSplashComplete} />}
                  
                  {appState === 'registration' && (
                      <div className="absolute inset-0 flex flex-col bg-bg-page">
                          <div className="flex-1 overflow-y-auto no-scrollbar">
                              {renderStep()}
                          </div>
                          {/* iOS Home Indicator */}
                          <div className="h-8 flex items-center justify-center pb-2 shrink-0">
                              <div className="w-[134px] h-[5px] bg-black rounded-full" />
                          </div>
                      </div>
                  )}
              </div>
          );
      };

      const root = ReactDOM.createRoot(document.getElementById('root'));
      root.render(<App />);
  </script>
</body>
</html>
