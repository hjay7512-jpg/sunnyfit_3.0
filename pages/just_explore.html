                <div className="flex h-screen w-screen overflow-hidden bg-[#222]">
                    <div className="flex-1 flex items-center justify-center border-r border-white/10 p-4 relative">
                        <div className="absolute top-4 left-4 text-white/30 font-mono text-xs">
                            SIMULATOR PREVIEW <br/>
                            <span className="text-[10px] opacity-50">Interactive Mode</span>
                        </div>
                        <Simulator specs={specs} />
                    </div>
                    <div className="w-[550px] flex flex-col bg-[#F5F7FA] shadow-2xl relative">
                        <div className="p-6 bg-white border-b border-gray-200 flex justify-between items-start shrink-0">
                            <div className="flex-1 mr-4">
                                {isEditing ? (
                                    <input className="edit-input text-xl font-bold text-brand-blue" value={specs.metadata.title} onChange={(e) => updateMeta('title', e.target.value)} />
                                ) : (
                                    <h1 className="text-xl font-bold text-brand-blue">{specs.metadata.title}</h1>
                                )}
                                <div className="flex items-center gap-3 mt-2 text-xs text-text-secondary">
                                    <span className="bg-gray-100 px-2 py-0.5 rounded">v{specs.metadata.version}</span>
                                    <span>Updated: {specs.metadata.lastUpdated}</span>
                                </div>
                            </div>
                            <div className="flex gap-2">
                                <button onClick={() => setIsEditing(!isEditing)} className={`px-3 py-1.5 rounded text-xs font-bold ${isEditing?'bg-brand-blue text-white':'bg-gray-200 text-gray-600'}`}>
                                    {isEditing ? '完成' : '编辑'}
                                </button>
                                <button onClick={handleSaveFile} className="px-3 py-1.5 bg-brand-green text-white rounded text-xs font-bold flex items-center gap-1">
                                    <span>💾</span> 保存
                                </button>
                            </div>
                        </div>
                        <div className="flex-1 overflow-y-auto p-6 space-y-8 editor-scroll pb-20">
                            <section>
                                <div className="flex items-center gap-2 mb-3"><div className="w-1 h-5 bg-brand-red rounded-full"></div><h2 className="font-bold text-brand-blue">1. 功能概述</h2></div>
                                <div className="bg-white p-4 rounded-xl shadow-sm border border-gray-100">
                                    {isEditing ? <textarea className="edit-textarea" value={specs.metadata.overview.content} onChange={e => updateOverview(e.target.value)} /> : <p className="text-sm text-gray-600 leading-relaxed whitespace-pre-line">{specs.metadata.overview.content}</p>}
                                </div>
                            </section>
                            <section>
                                <div className="flex items-center gap-2 mb-3"><div className="w-1 h-5 bg-brand-red rounded-full"></div><h2 className="font-bold text-brand-blue">2. 心情/场景逻辑配置 (Scenes)</h2></div>
                                <div className="space-y-4">
                                    {Object.entries(specs.scenes).map(([key, scene], idx) => (
                                        <div key={key} className="bg-white p-5 rounded-xl shadow-sm border border-gray-100 relative group">
                                            <div className="absolute top-5 right-5 text-[24px] opacity-20">{scene.icon}</div>
                                            <div className="mb-4 pb-2 border-b border-gray-100">
                                                <h3 className="font-bold text-brand-blue text-sm uppercase tracking-wider mb-1">Scene: {scene.label}</h3>
                                                <span className="text-[10px] text-gray-400 font-mono">ID: {key}</span>
                                            </div>
                                            <div className="grid gap-3 mb-4">
                                                <div>
                                                    <label className="text-[10px] font-bold text-gray-400 uppercase">Dialogue Title</label>
                                                    {isEditing ? <input className="edit-input text-xs" value={scene.dialogueTitle} onChange={e => updateScene(key, 'dialogueTitle', e.target.value)} /> : <div className="text-xs font-bold text-gray-700">{scene.dialogueTitle}</div>}
                                                </div>
                                                <div>
                                                    <label className="text-[10px] font-bold text-gray-400 uppercase">Dialogue Body</label>
                                                    {isEditing ? <textarea className="edit-textarea" value={scene.dialogueBody} onChange={e => updateScene(key, 'dialogueBody', e.target.value)} /> : <div className="text-xs text-gray-600">{scene.dialogueBody}</div>}
                                                </div>
                                                <div className="grid grid-cols-2 gap-2">
                                                    <div><label className="text-[10px] font-bold text-gray-400 uppercase">Recommended Course</label>{isEditing ? <input className="edit-input text-xs" value={scene.courseTitle} onChange={e => updateScene(key, 'courseTitle', e.target.value)} /> : <div className="text-xs font-bold text-brand-red">{scene.courseTitle}</div>}</div>
                                                    <div><label className="text-[10px] font-bold text-gray-400 uppercase">Tags</label>{isEditing ? <input className="edit-input text-xs" value={scene.courseTag} onChange={e => updateScene(key, 'courseTag', e.target.value)} /> : <div className="text-xs text-gray-500">{scene.courseTag}</div>}</div>
                                                </div>
                                                <div><label className="text-[10px] font-bold text-gray-400 uppercase">Image URL</label>{isEditing ? <input className="edit-input text-[10px] text-gray-400 truncate" value={scene.image} onChange={e => updateScene(key, 'image', e.target.value)} /> : <div className="text-[10px] text-gray-400 truncate cursor-pointer hover:text-brand-blue" onClick={() => window.open(scene.image)}>{scene.image}</div>}</div>
                                            </div>
                                            <div className="bg-gray-50 p-3 rounded-lg border border-gray-100">
                                                <h4 className="text-[11px] font-bold text-gray-400 uppercase mb-2">业务规则 (Rules)</h4>
                                                <ul className="space-y-2">
                                                    {(scene.rules || []).map((rule, ri) => (
                                                        <li key={ri} className="flex items-start gap-2 text-xs text-gray-600">
                                                            <span className="mt-1.5 w-1 h-1 bg-brand-red rounded-full shrink-0"></span>
                                                            {isEditing ? <div className="flex-1 flex gap-2"><input className="edit-input" value={rule} onChange={e => updateRule(key, ri, e.target.value)} /><button onClick={() => removeRule(key, ri)} className="text-red-400 text-[10px]">×</button></div> : <span>{rule}</span>}
                                                        </li>
                                                    ))}
                                                </ul>
                                                {isEditing && <button onClick={() => addRule(key)} className="mt-2 text-[10px] text-brand-blue font-bold border border-dashed border-brand-blue/30 px-2 py-1 rounded hover:bg-brand-blue/5">+ 添加规则</button>}
                                            </div>
                                        </div>
                                    ))}
                                </div>
                            </section>
                        </div>
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
