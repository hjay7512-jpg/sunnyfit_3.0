<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunnyFit: Plan Create (SOP 2.0)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        // SOP 2.0 MapsTo 跨级路由：供本页及子组件调用，统一通过父级 Viewer 切换 page 参数
        function navigateTo(targetPageId) {
            try {
                const parentParams = new URLSearchParams(window.parent.location.search);
                parentParams.set('page', targetPageId);
                window.parent.location.search = parentParams.toString();
            } catch (e) {
                console.warn("未检测到 Viewer 外壳，执行降级跳转");
                alert("SOP 路由触发：即将前往 -> " + targetPageId);
            }
        }
        if (typeof window !== 'undefined') window.navigateTo = navigateTo;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { red: '#EE4343', blue: '#31426D', beige: '#F6E2CF', green: '#2BA471', darkRed: '#8B0000', sky: '#BDD0EB' },
                        bg: { page: '#FFFBF7', card: '#FFFFFF', neutral: '#F5F7FA' },
                        text: { primary: '#31426D', secondary: '#666666' }
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    boxShadow: {
                        'glow': '0px 10px 30px rgba(222, 37, 41, 0.4)',
                        'float-btn': '0px 10px 20px rgba(238, 67, 67, 0.3)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'slide-in': 'slideIn 0.4s ease-out forwards',
                        'breathe': 'breathe 4s ease-in-out infinite',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pop': 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        fadeUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideIn: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        breathe: { 
                            '0%, 100%': { transform: 'scale(1)', filter: 'drop-shadow(0px 10px 20px rgba(222, 37, 41, 0.3))' }, 
                            '50%': { transform: 'scale(1.05)', filter: 'drop-shadow(0px 15px 30px rgba(222, 37, 41, 0.5))' } 
                        },
                        pop: { '0%': { transform: 'scale(0.95)' }, '50%': { transform: 'scale(1.02)' }, '100%': { transform: 'scale(1)' } },
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        .mobile-viewport { width: 390px; height: 844px; background-color: #FFFBF7; position: relative; overflow: hidden; border-radius: 40px; border: 8px solid #333; box-shadow: 0px 30px 60px rgba(0,0,0,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        // --- Data Definitions ---
        const GOALS = [
            { id: 'fat_loss', label: 'Weight Loss', sub: 'Burn fat, high intensity, sweat.', icon: '🔥' },
            { id: 'muscle', label: 'Build Muscle', sub: 'Strength, tone, power.', icon: '💪' },
            { id: 'vitality', label: 'Health & Vitality', sub: 'Wake up, cardio, energy.', icon: '⚡' },
            { id: 'rehab', label: 'Rehab & Stretch', sub: 'Flexibility, pain-free, recovery.', icon: '🧘' }
        ];

        const MAJOR_EQUIPMENT = [
            'Bike', 'Treadmill', 'Rower', 'Elliptical', 
            'Stepper', 'Row-N-Ride', 'Stair Climber'
        ];
        const SMALL_EQUIPMENT = ['Dumbbells', 'Bands', 'Yoga Ball'];

        const COACHES = [
            { id: 'alex', name: 'Alex', title: 'The Motivator', quote: "I'll keep your energy high. We've got this!", avatar: '🦁', color: 'bg-brand-red' },
            { id: 'sarah', name: 'Sarah', title: 'The Pro', quote: "I focus on form and precision. Let's do it right.", avatar: '🧢', color: 'bg-brand-blue' },
            { id: 'max', name: 'Max', title: 'Drill Sergeant', quote: "No excuses. I'm here to push your limits.", avatar: '⚡', color: 'bg-black' }
        ];

        // --- Icons ---
        const Icons = {
            ChevronLeft: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg>
        };

        // --- SunnyLogo Component ---
        const SunnyLogo = ({ avatar = null, className = "", bgColor="bg-white" }) => {
            // Standard Logo (Brand) - 恢复：无背景容器，直接渲染SVG形状
            if (!avatar) {
                return (
                    <div className={`w-[88px] h-[88px] flex items-center justify-center animate-breathe ${className}`}>
                        {/* 移除 rounded-full bg-white，让 SVG 自身的圆角矩形形状展示 */}
                        <svg viewBox="0 0 32 32" fill="none" className="w-full h-full drop-shadow-glow">
                            <path d="M16.013 32C13.271 31.9018 10.5412 31.8755 7.87463 31.1231C3.57228 29.9252 1.23878 26.956 0.52873 22.6889C-0.165498 18.3226 -0.176144 13.8749 0.497173 9.50531C1.23001 4.58405 4.38577 1.32017 9.29472 0.537958C13.609 -0.165525 18.0077 -0.17914 22.3262 0.497619C27.7401 1.35875 30.6837 4.27187 31.513 9.76137C32.1817 14.0582 32.1521 18.4348 31.4253 22.7222C30.5207 27.9048 27.3527 30.867 22.079 31.558C20.0716 31.8176 18.0362 31.8597 16.013 32Z" fill="#EE4343" />
                            <path d="M15.3836 6.16027C15.9406 6.15315 16.4468 6.48357 16.6646 6.99654C16.8824 7.50952 16.7687 8.10332 16.3767 8.49943C15.9848 8.89555 15.3925 9.01542 14.8774 8.80283C14.3624 8.59024 14.027 8.08735 14.0283 7.53001C14.0358 6.78206 14.636 6.1754 15.3836 6.16027Z" fill="#FFFFFF" />
                            <path d="M19.6492 11.387C18.5149 11.7676 17.3455 12.0377 16.2287 12.4744C15.8322 12.6166 15.4556 12.8094 15.1084 13.0479C13.9776 13.8722 13.939 14.9315 14.9611 15.9768C15.7606 16.7959 16.7231 17.4115 17.5769 18.1586C18.9041 19.3214 18.9637 20.5245 17.7312 21.8118C16.4829 23.1255 14.905 23.9726 13.2676 24.6811C12.5908 24.974 11.8983 25.2283 11.2128 25.5002C11.0314 25.3255 10.9531 25.0694 11.0059 24.8232C12.0619 24.4117 13.0326 23.8082 13.8689 23.043C14.3759 22.5899 14.8315 22.0823 15.2276 21.5295C16.092 20.3018 16.0446 19.5722 15.0523 18.4445C14.3405 17.6412 13.5095 16.945 12.9134 16.0365C11.7317 14.2335 12.2928 12.0623 14.1722 10.9977C15.6747 10.1471 17.2876 9.58586 18.9234 9.06848C19.6106 8.85451 20.1226 9.11759 20.3259 9.7402C20.5766 10.5312 20.34 11.159 19.6492 11.387Z" fill="#FFFFFF" />
                        </svg>
                    </div>
                );
            }
            // Coach Avatar (Persona)
            // 修正：从 rounded-full 改为 rounded-[30px]，模拟 Logo 的 Squircle 形状
            return (
                <div className={`w-[88px] h-[88px] flex items-center justify-center rounded-[30px] shadow-lg overflow-hidden transition-all duration-500 ${className} ${bgColor}`}>
                    <span className="text-4xl">{avatar}</span>
                </div>
            );
        };

        const LEVELS = [
            { id: 'beginner', label: 'Beginner', sub: 'Just starting out' },
            { id: 'intermediate', label: 'Intermediate', sub: 'I work out sometimes' },
            { id: 'advanced', label: 'Advanced', sub: 'Looking for a challenge' }
        ];
        const WEEKDAYS = [
            { id: 'mon', label: 'M' }, { id: 'tue', label: 'T' }, { id: 'wed', label: 'W' },
            { id: 'thu', label: 'T' }, { id: 'fri', label: 'F' }, { id: 'sat', label: 'S' }, { id: 'sun', label: 'S' }
        ];
        const BODY_QUIRKS = [
            { id: 'knee_friendly', label: '🦵 Knee-Friendly'},
            { id: 'back_care', label: '🦴 Back Care'},
            { id: 'wrist_shoulder', label: '💪 Wrist & Shoulder'},
            { id: 'no_jump', label: '🔇 No Jump'},
            { id: 'stand', label: '🧍‍♀️ Standing Only'},
            { id: 'pregnant', label: '🤰 Pregnant'},
        ];

        const App = () => {
            const [step, setStep] = useState(1);
            const [selections, setSelections] = useState({ goal: null, equip: [], level: null, focusDays: [], bodyQuirks: [] });
            const [thinking, setThinking] = useState(false);
            const [selectedCoach, setSelectedCoach] = useState(null);

            const handleNext = () => {
                if (step === 5) {
                    setThinking(true);
                    setTimeout(() => { 
                        setThinking(false);
                        setStep(6);
                    }, 2500);
                } else { setStep(step + 1); }
            };

            const handleNoEquipment = () => {
                setSelections(prev => ({ ...prev, equip: [] }));
                setStep(3);
            };

            const toggleEquipment = (item) => {
                setSelections(prev => {
                    let newEquip = prev.equip.includes(item) ? prev.equip.filter(i => i !== item) : [...prev.equip, item];
                    return { ...prev, equip: newEquip };
                });
            };

            const toggleFocusDay = (dayId) => {
                setSelections(prev => ({
                    ...prev,
                    focusDays: prev.focusDays.includes(dayId) ? prev.focusDays.filter(i => i !== dayId) : [...prev.focusDays, dayId]
                }));
            };

            const toggleBodyQuirk = (id) => {
                setSelections(prev => ({
                    ...prev,
                    bodyQuirks: prev.bodyQuirks.includes(id) ? prev.bodyQuirks.filter(i => i !== id) : [...prev.bodyQuirks, id]
                }));
            };

            return (
                <div className="mobile-viewport bg-bg-page flex flex-col font-sans">
                    {/* Header */}
                    <div className="px-6 pt-10 pb-4 flex items-center shrink-0">
                        <button 
                            onClick={() => { if (thinking) return; step === 1 ? window.navigateTo('intent_select') : setStep(step - 1); }} 
                            className={`w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue active:scale-95 transition-all ${thinking ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}
                            data-zone-id="plan_create_header_back"
                        ><Icons.ChevronLeft /></button>
                    </div>

                    <div className="flex-1 flex flex-col overflow-y-auto no-scrollbar relative">
                        
                        {/* Step 1: Goal */}
                        {step === 1 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_goal">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2" data-i18n-key="plan_create_title_focus">What is your core focus?</h3>
                                    <p className="text-[14px] text-text-secondary" data-i18n-key="plan_create_subtitle_focus">I will tailor your journey based on this goal.</p>
                                </div>
                                <div className="mt-8 px-6 space-y-3">
                                    {GOALS.map(g => (
                                        <div key={g.id} onClick={() => setSelections({...selections, goal: g.id})} data-zone-id={`plan_create_goal_${g.id}`} data-track-id="click_goal_card" data-track-params={JSON.stringify({ goal: g.id })} className={`p-5 rounded-[24px] border-2 transition-all flex items-center gap-4 cursor-pointer ${selections.goal === g.id ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-sm'}`}>
                                            <span className="text-2xl">{g.icon}</span>
                                            <div className="text-left"><h4 className={`font-bold text-[15px] ${selections.goal === g.id ? 'text-brand-red' : 'text-text-primary'}`}>{g.label}</h4><p className="text-[11px] text-text-secondary">{g.sub}</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Step 2: Equipment */}
                        {step === 2 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_equipment">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2" data-i18n-key="plan_create_title_equipment">Your training space?</h3>
                                    <p className="text-[14px] text-text-secondary" data-i18n-key="plan_create_subtitle_equipment">Select what you have available.</p>
                                </div>
                                
                                <div className="mt-8 px-6 pb-20">
                                    <h4 className="text-[12px] font-bold text-text-secondary uppercase tracking-widest mb-3 ml-1" data-i18n-key="plan_create_label_cardio">Cardio Machines</h4>
                                    <div className="grid grid-cols-2 gap-3 mb-6">
                                        {MAJOR_EQUIPMENT.map(e => (
                                            <div key={e} onClick={() => toggleEquipment(e)} data-prd-zone={`plan_create_equip_${e.toLowerCase().replace(/\s+/g, '_')}`} className={`p-4 rounded-[16px] border-2 transition-all cursor-pointer flex flex-col justify-between h-20 ${selections.equip.includes(e) ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-sm'}`}>
                                                <div className={`text-[13px] font-bold leading-tight ${selections.equip.includes(e) ? 'text-brand-red' : 'text-text-primary'}`}>{e}</div>
                                                {selections.equip.includes(e) && <div className="self-end text-brand-red"><Icons.Check /></div>}
                                            </div>
                                        ))}
                                    </div>

                                    <h4 className="text-[12px] font-bold text-text-secondary uppercase tracking-widest mb-3 ml-1" data-i18n="plan_create_label_accessories">Accessories</h4>
                                    <div className="flex flex-wrap gap-3">
                                        {SMALL_EQUIPMENT.map(e => (
                                            <div key={e} onClick={() => toggleEquipment(e)} data-prd-zone={`plan_create_equip_${e.toLowerCase().replace(/\s+/g, '_')}`} className={`px-4 py-3 rounded-[16px] border-2 transition-all cursor-pointer font-bold text-[12px] ${selections.equip.includes(e) ? 'border-brand-red bg-brand-red/5 text-brand-red' : 'border-transparent bg-white shadow-sm text-text-primary'}`}>
                                                {e}
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Step 3: Current Level - 确立起点 */}
                        {step === 3 && !thinking && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_level">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2" data-i18n-key="plan_create_title_level">Current Level</h3>
                                    <p className="text-[14px] text-text-secondary" data-i18n-key="plan_create_subtitle_level">Establish your starting point.</p>
                                </div>
                                <div className="mt-8 px-6 space-y-3">
                                    {LEVELS.map(l => (
                                        <div key={l.id} onClick={() => setSelections({...selections, level: l.id})} data-zone-id={`plan_create_level_${l.id}`} className={`p-5 rounded-[24px] border-2 transition-all flex items-center gap-4 cursor-pointer ${selections.level === l.id ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-sm'}`}>
                                            <div className="text-left flex-1">
                                                <h4 className={`font-bold text-[15px] ${selections.level === l.id ? 'text-brand-red' : 'text-text-primary'}`}>{l.label}</h4>
                                                <p className="text-[11px] text-text-secondary">{l.sub}</p>
                                            </div>
                                            {selections.level === l.id && <div className="text-brand-red shrink-0"><Icons.Check /></div>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* Step 4: Weekly Focus Days - 核心心智改造 */}
                        {step === 4 && !thinking && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_focus_days">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2" data-i18n-key="plan_create_title_focus_days">Select your Weekly Focus Days</h3>
                                    <p className="text-[14px] text-text-secondary leading-relaxed" data-i18n-key="plan_create_subtitle_focus_days">3-4 days to push hard. I'll fill the rest with gentle recovery flows so you stay active every day.</p>
                                </div>
                                <div className="mt-8 px-6">
                                    <div className="flex justify-between gap-2">
                                        {WEEKDAYS.map((d) => (
                                            <div key={d.id} onClick={() => toggleFocusDay(d.id)} data-zone-id={`plan_create_focus_${d.id}`} className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-[14px] transition-all cursor-pointer flex-1 max-w-[48px] ${selections.focusDays.includes(d.id) ? 'bg-brand-red text-white shadow-glow' : 'bg-white text-text-primary shadow-sm border-2 border-transparent hover:border-brand-red/30'}`}>
                                                {d.label}
                                            </div>
                                        ))}
                                    </div>
                                    <p className="text-[11px] text-text-secondary mt-4 text-center"></p>
                                </div>
                            </div>
                        )}

                        {/* Step 5: Body Quirks / Exclude - 部位保护 */}
                        {step === 5 && !thinking && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_body_quirks">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2" data-i18n-key="plan_create_title_body_quirks">Anything I should keep in mind?</h3>
                                    <p className="text-[14px] text-text-secondary" data-i18n-key="plan_create_subtitle_body_quirks"></p>
                                </div>
                                <div className="mt-8 px-6 flex flex-wrap gap-3 justify-center">
                                    {BODY_QUIRKS.map(q => (
                                        <button key={q.id} onClick={() => toggleBodyQuirk(q.id)} data-zone-id={`plan_create_quirk_${q.id}`} className={`px-5 py-3 rounded-full border-2 transition-all font-semibold text-[13px] cursor-pointer ${selections.bodyQuirks.includes(q.id) ? 'border-brand-red bg-brand-red/5 text-brand-red' : 'border-transparent bg-white text-text-primary shadow-sm'}`}>
                                            {q.label} <span className="text-[10px] opacity-70"></span>
                                        </button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {/* AI Thinking Simulation - 修正：保持 Logo 位置不变，仅内容切换 */}
                        {thinking && (
                            <div className="absolute inset-0 z-50 flex flex-col items-center bg-bg-page animate-fade-up" data-zone-id="plan_create_thinking" data-prd-zone="plan_create_thinking">
                                {/* 头部区域：使用 flex-col + pt-2，与之前的步骤完全对齐 */}
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6 animate-pulse-slow"><SunnyLogo /></div>
                                    <div className="mt-10 space-y-4">
                                        <h3 className="text-[18px] font-bold text-brand-blue italic" data-i18n="plan_create_thinking_title">"Analyzing fat loss goals..."</h3>
                                        <p className="text-[13px] text-text-secondary leading-relaxed">Designing plan for <b>{selections.equip.length > 0 ? selections.equip[0] : "Bodyweight"}</b>...</p>
                                        <div className="flex gap-2 justify-center pt-4"><div className="w-2 h-2 bg-brand-red rounded-full animate-bounce"></div><div className="w-2 h-2 bg-brand-red rounded-full animate-bounce" style={{animationDelay:'0.2s'}}></div><div className="w-2 h-2 bg-brand-red rounded-full animate-bounce" style={{animationDelay:'0.4s'}}></div></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* Step A: The Vision & Commitment (Step 6) */}
                        {step === 6 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_vision">
                                <div className="px-8 pt-2 flex flex-col items-center text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[22px] font-bold text-text-primary leading-tight mt-2" data-i18n="plan_create_title_strategy">Your Strategy for Mastery</h3>
                                    <p className="text-[13px] text-text-secondary mt-3 leading-relaxed" data-i18n="plan_create_subtitle_strategy">
                                        Weight loss isn't about a single workout; it’s about a metabolic shift.
                                    </p>
                                </div>
                                
                                <div className="mt-8 px-6">
                                    <div className="flex items-end justify-between h-40 gap-3 mb-4">
                                        {/* Column 1: Wake Up */}
                                        <div className="flex-1 h-full flex flex-col justify-end items-center gap-2">
                                            <div className="w-full rounded-t-lg transition-all ease-out duration-1000 bg-[#BDD0EB] opacity-60" style={{height: '25%'}}></div>
                                            <span className="text-[10px] font-bold text-text-secondary uppercase">Wake Up</span>
                                        </div>
                                        {/* Column 2: Burn */}
                                        <div className="flex-1 h-full flex flex-col justify-end items-center gap-2">
                                            <div className="w-full rounded-t-lg transition-all ease-out duration-1000 delay-100 bg-[#BDD0EB]" style={{height: '50%'}}></div>
                                            <span className="text-[10px] font-bold text-text-secondary uppercase">Burn</span>
                                        </div>
                                        {/* Column 3: Shape */}
                                        <div className="flex-1 h-full flex flex-col justify-end items-center gap-2">
                                            <div className="w-full rounded-t-lg transition-all ease-out duration-1000 delay-200 bg-[#31426D] opacity-80" style={{height: '75%'}}></div>
                                            <span className="text-[10px] font-bold text-text-secondary uppercase">Shape</span>
                                        </div>
                                        {/* Column 4: Habit */}
                                        <div className="flex-1 h-full flex flex-col justify-end items-center gap-2">
                                            <div className="w-full rounded-t-lg transition-all ease-out duration-1000 delay-300 bg-[#EE4343] relative" style={{height: '100%'}}>
                                                <div className="absolute top-2 left-1/2 -translate-x-1/2 text-white text-xs">★</div>
                                            </div>
                                            <span className="text-[10px] font-bold text-brand-red uppercase">Habit</span>
                                        </div>
                                    </div>

                                    <div className="mt-6 bg-white p-5 rounded-[20px] shadow-sm border border-brand-red/10">
                                        <h4 className="text-[13px] font-bold text-brand-red mb-2 uppercase">One Final Question</h4>
                                        <p className="text-[12px] text-text-primary leading-relaxed">
                                            The road to a new you requires consistency, not perfection.
                                            <br/><br/>
                                            <b>Are you ready to commit to this journey?</b>
                                        </p>
                                    </div>
                                </div>
                                <div className="h-24"></div>
                            </div>
                        )}

                        {/* Step B: The Partnership (Coach Selection) */}
                        {step === 7 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_coach">
                                <div className="px-8 pt-2 flex flex-col items-center text-center">
                                    <div className="mb-6"><SunnyLogo /></div>
                                    <h3 className="text-[22px] font-bold text-text-primary leading-tight mt-2" data-i18n="plan_create_title_partnership">The Partnership</h3>
                                    <p className="text-[13px] text-text-secondary mt-3 leading-relaxed" data-i18n="plan_create_subtitle_partnership">
                                        Consistency is the only challenge. Who do you want by your side?
                                    </p>
                                </div>

                                <div className="mt-8 px-6 space-y-4">
                                    {COACHES.map(c => (
                                        <div key={c.id} onClick={() => setSelectedCoach(c)} data-prd-zone={`plan_create_coach_${c.id}`} className={`bg-white p-5 rounded-[24px] shadow-card cursor-pointer border-2 transition-all flex items-start gap-4 ${selectedCoach?.id === c.id ? 'border-brand-red ring-1 ring-brand-red transform scale-[1.02]' : 'border-transparent active:scale-95'}`}>
                                            <div className={`w-12 h-12 rounded-full flex items-center justify-center text-2xl shrink-0 ${c.color} text-white shadow-md`}>
                                                {c.avatar}
                                            </div>
                                            <div>
                                                <div className="flex items-center gap-2 mb-1">
                                                    <h5 className="font-bold text-text-primary text-[15px]">{c.name}</h5>
                                                    <span className="text-[10px] bg-bg-neutral px-2 py-0.5 rounded text-text-secondary font-bold uppercase">{c.title}</span>
                                                </div>
                                                <p className="text-[12px] text-text-secondary leading-snug italic">"{c.quote}"</p>
                                            </div>
                                        </div>
                                    ))}
                                </div>
                                <div className="h-24"></div>
                            </div>
                        )}

                        {/* Step C: The Ignition (Persona Switch) */}
                        {step === 8 && selectedCoach && (
                            <div className="animate-fade-up" data-zone-id="plan_create_ignition">
                                <div className="px-8 pt-6 flex flex-col items-center text-center" data-prd-zone="plan_create_ignition">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach.avatar} bgColor={selectedCoach.color} className="shadow-xl scale-110" /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2" data-i18n="plan_create_title_ignition">"Good choice. I'm {selectedCoach.name}."</h3>
                                    <p className="text-[14px] text-text-secondary mt-3 leading-relaxed px-2" data-i18n="plan_create_subtitle_ignition">
                                        I don't believe in taking the easy way out. But first, we ignite.
                                    </p>
                                </div>

                                <div className="mt-8 px-6">
                                    <div className="bg-white rounded-[28px] shadow-float-btn overflow-hidden">
                                        <div className="bg-brand-blue p-6 text-white text-center relative overflow-hidden">
                                            <div className="absolute top-0 left-0 w-full h-full opacity-10 bg-[url('https://www.transparenttextures.com/patterns/carbon-fibre.png')]"></div>
                                            <h4 className="text-[12px] font-bold opacity-70 uppercase tracking-widest mb-1 relative z-10">Phase 01</h4>
                                            <h2 className="text-[20px] font-extrabold relative z-10">The Ignite Sequence</h2>
                                            <div className="inline-block mt-2 px-3 py-1 bg-white/20 rounded-full text-[10px] font-bold backdrop-blur-sm relative z-10">3 DAYS DURATION</div>
                                        </div>
                                        <div className="p-6">
                                            <div className="flex items-center gap-4 mb-4">
                                                <div className="w-12 h-12 rounded-[16px] bg-brand-red/10 text-brand-red flex items-center justify-center font-bold text-xl">01</div>
                                                <div>
                                                    <h5 className="font-bold text-text-primary text-[15px]">15-Min Power Rhythm</h5>
                                                    <p className="text-[11px] text-text-secondary mt-0.5">Non-negotiable mission.</p>
                                                </div>
                                            </div>
                                            <div className="bg-bg-neutral p-4 rounded-[16px] text-center">
                                                <p className="text-[12px] text-text-primary font-medium italic">"The bike is waiting. Don't think. Just start."</p>
                                            </div>
                                        </div>
                                    </div>
                                </div>
                                <div className="h-24"></div>
                            </div>
                        )}
                    </div>

                    {/* Bottom CTA Area */}
                    <div className="px-6 pb-12 pt-4 bg-gradient-to-t from-bg-page via-bg-page to-transparent shrink-0 z-50" data-zone-id="plan_create_cta_area" data-prd-zone="plan_create_cta_area">
                        {step === 1 && (
                            <button 
                                onClick={handleNext} 
                                disabled={!selections.goal}
                                className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-30"
                                data-prd-zone="plan_create_cta_continue"
                            ><span data-i18n="plan_create_cta_continue_label">Continue</span></button>
                        )}
                        {step === 2 && (
                            <>
                                <button 
                                    onClick={handleNext} 
                                    disabled={selections.equip.length === 0}
                                    className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-30"
                                    data-prd-zone="plan_create_cta_continue"
                                ><span data-i18n="plan_create_cta_continue_label">Continue</span></button>
                                <button onClick={handleNoEquipment} className="mt-3 w-full py-3 text-text-secondary text-[14px] font-medium underline hover:text-brand-red transition-colors" data-prd-zone="plan_create_equip_none">No Equipment</button>
                            </>
                        )}
                        {step >= 3 && step <= 4 && !thinking && (
                            <button 
                                onClick={handleNext} 
                                disabled={step === 3 && !selections.level}
                                className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-30"
                                data-prd-zone="plan_create_cta_continue"
                            ><span data-i18n="plan_create_cta_continue_label">Continue</span></button>
                        )}
                        {step === 5 && !thinking && (
                            <button onClick={handleNext} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95" data-prd-zone="plan_create_cta_generate">Generate My AI Plan</button>
                        )}
                        {step === 6 && (
                            <button onClick={handleNext} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 animate-pop" data-prd-zone="plan_create_cta_yes">YES, I CAN DO THIS</button>
                        )}
                        {step === 7 && (
                            <button onClick={handleNext} disabled={!selectedCoach} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 disabled:opacity-50" data-prd-zone="plan_create_cta_confirm_coach">Confirm Coach</button>
                        )}
                        {step === 8 && (
                            <button onClick={() => window.navigateTo('first_ride')} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn animate-pop" data-prd-zone="plan_create_cta_start_now">START NOW</button>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
