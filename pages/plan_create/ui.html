<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunnyFit: Plan Create (SOP 2.0 - Final UI Consistent)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        function navigateTo(targetPageId) {
            console.log("🔗 准备跳转至:", targetPageId);
            const cleanId = targetPageId.replace(/\.html$/, '');
            const targetFile = cleanId + '.html';

            try {
                if (window.parent !== window && window.parent.location.search.includes('page=')) {
                    const parentParams = new URLSearchParams(window.parent.location.search);
                    parentParams.set('page', cleanId);
                    window.parent.location.search = parentParams.toString();
                    return;
                }
            } catch (e) {
                console.warn("非 Shell 环境，准备执行物理跳转");
            }

            if (!window.location.pathname.endsWith(targetFile)) {
                window.location.href = targetFile;
            }
        }
        if (typeof window !== 'undefined') window.navigateTo = navigateTo;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { red: '#EE4343', blue: '#31426D', beige: '#F6E2CF', green: '#2BA471', darkRed: '#8B0000', sky: '#BDD0EB' },
                        bg: { page: '#FFFBF7', card: '#FFFFFF', neutral: '#F5F7FA' },
                        text: { primary: '#31426D', secondary: '#666666' }
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    boxShadow: {
                        'glow': '0px 10px 30px rgba(222, 37, 41, 0.4)',
                        'float-btn': '0px 10px 20px rgba(238, 67, 67, 0.3)',
                    },
                    animation: {
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'slide-in': 'slideIn 0.4s ease-out forwards',
                        'breathe': 'breathe 4s ease-in-out infinite',
                        'pulse-slow': 'pulse 2s cubic-bezier(0.4, 0, 0.6, 1) infinite',
                        'pop': 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards',
                    },
                    keyframes: {
                        fadeUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideIn: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        breathe: { 
                            '0%, 100%': { transform: 'scale(1)', filter: 'drop-shadow(0px 10px 20px rgba(222, 37, 41, 0.3))' }, 
                            '50%': { transform: 'scale(1.05)', filter: 'drop-shadow(0px 15px 30px rgba(222, 37, 41, 0.5))' } 
                        },
                        pop: { '0%': { transform: 'scale(0.95)' }, '50%': { transform: 'scale(1.02)' }, '100%': { transform: 'scale(1)' } },
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        .mobile-viewport { width: 390px; height: 844px; background-color: #FFFBF7; position: relative; overflow: hidden; border-radius: 40px; border: 8px solid #333; box-shadow: 0px 30px 60px rgba(0,0,0,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const GOALS = [
            { id: 'fat_loss', label: 'Weight Loss', sub: 'Burn fat, high intensity, sweat.', icon: '🔥' },
            { id: 'muscle', label: 'Build Muscle', sub: 'Strength, tone, power.', icon: '💪' },
            { id: 'vitality', label: 'Health & Vitality', sub: 'Wake up, cardio, energy.', icon: '⚡' },
            { id: 'rehab', label: 'Rehab & Stretch', sub: 'Flexibility, pain-free, recovery.', icon: '🧘' }
        ];

        const MAJOR_EQUIPMENT = ['Bike', 'Treadmill', 'Rower', 'Elliptical', 'Stepper', 'Row-N-Ride', 'Stair Climber'];
        const SMALL_EQUIPMENT = ['Dumbbells', 'Bands', 'Yoga Ball'];

        const Icons = {
            ChevronLeft: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>,
            Check: () => <svg className="w-4 h-4" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="3" d="M5 13l4 4L19 7"/></svg>
        };

        const SunnyLogo = ({ avatar = null, className = "", bgColor="bg-white" }) => {
            if (!avatar) {
                return (
                    <div className={`w-[88px] h-[88px] flex items-center justify-center animate-breathe ${className}`}>
                        <svg viewBox="0 0 32 32" fill="none" className="w-full h-full drop-shadow-glow">
                            <path d="M16.013 32C13.271 31.9018 10.5412 31.8755 7.87463 31.1231C3.57228 29.9252 1.23878 26.956 0.52873 22.6889C-0.165498 18.3226 -0.176144 13.8749 0.497173 9.50531C1.23001 4.58405 4.38577 1.32017 9.29472 0.537958C13.609 -0.165525 18.0077 -0.17914 22.3262 0.497619C27.7401 1.35875 30.6837 4.27187 31.513 9.76137C32.1817 14.0582 32.1521 18.4348 31.4253 22.7222C30.5207 27.9048 27.3527 30.867 22.079 31.558C20.0716 31.8176 18.0362 31.8597 16.013 32Z" fill="#EE4343" />
                            <path d="M15.3836 6.16027C15.9406 6.15315 16.4468 6.48357 16.6646 6.99654C16.8824 7.50952 16.7687 8.10332 16.3767 8.49943C15.9848 8.89555 15.3925 9.01542 14.8774 8.80283C14.3624 8.59024 14.027 8.08735 14.0283 7.53001C14.0358 6.78206 14.636 6.1754 15.3836 6.16027Z" fill="#FFFFFF" />
                            <path d="M19.6492 11.387C18.5149 11.7676 17.3455 12.0377 16.2287 12.4744C15.8322 12.6166 15.4556 12.8094 15.1084 13.0479C13.9776 13.8722 13.939 14.9315 14.9611 15.9768C15.7606 16.7959 16.7231 17.4115 17.5769 18.1586C18.9041 19.3214 18.9637 20.5245 17.7312 21.8118C16.4829 23.1255 14.905 23.9726 13.2676 24.6811C12.5908 24.974 11.8983 25.2283 11.2128 25.5002C11.0314 25.3255 10.9531 25.0694 11.0059 24.8232C12.0619 24.4117 13.0326 23.8082 13.8689 23.043C14.3759 22.5899 14.8315 22.0823 15.2276 21.5295C16.092 20.3018 16.0446 19.5722 15.0523 18.4445C14.3405 17.6412 13.5095 16.945 12.9134 16.0365C11.7317 14.2335 12.2928 12.0623 14.1722 10.9977C15.6747 10.1471 17.2876 9.58586 18.9234 9.06848C19.6106 8.85451 20.1226 9.11759 20.3259 9.7402C20.5766 10.5312 20.34 11.159 19.6492 11.387Z" fill="#FFFFFF" />
                        </svg>
                    </div>
                );
            }
            return (
                <div className={`w-[88px] h-[88px] flex items-center justify-center rounded-[30px] shadow-lg overflow-hidden transition-all duration-500 ${className} ${bgColor}`}>
                    <span className="text-4xl">{avatar}</span>
                </div>
            );
        };

        const LEVELS = [
            { id: 'beginner', label: 'Beginner', sub: 'Just starting out' },
            { id: 'intermediate', label: 'Intermediate', sub: 'I work out sometimes' },
            { id: 'advanced', label: 'Advanced', sub: 'Looking for a challenge' }
        ];
        const WEEKDAYS = [
            { id: 'mon', label: 'M' }, { id: 'tue', label: 'T' }, { id: 'wed', label: 'W' },
            { id: 'thu', label: 'T' }, { id: 'fri', label: 'F' }, { id: 'sat', label: 'S' }, { id: 'sun', label: 'S' }
        ];
        const BODY_QUIRKS = [
            { id: 'knee_friendly', label: '🦵 Knee-Friendly'},
            { id: 'back_care', label: '🦴 Back Care'},
            { id: 'wrist_shoulder', label: '💪 Wrist & Shoulder'},
            { id: 'no_jump', label: '🔇 No Jump'},
            { id: 'stand', label: '🧍‍♀️ Standing Only'},
            { id: 'pregnant', label: '🤰 Pregnant'},
        ];

        const BODY_STAT_ITEMS = [
            { id: 'gender', label: 'Gender', icon: '⚧', key: 'gender' },
            { id: 'birthday', label: 'Birthday', icon: '🎂', key: 'birthday' },
            { id: 'weight', label: 'Weight', icon: '⚖️', key: 'weight' },
            { id: 'height', label: 'Height', icon: '📏', key: 'height' }
        ];

        const App = () => {
            const [step, setStep] = useState(1);
            const [selections, setSelections] = useState({ goal: null, equip: [], level: null, focusDays: [], bodyQuirks: [] });
            const [bodyStats, setBodyStats] = useState({ gender: null, birthday: null, weight: null, height: null });
            const [bodyStatsSyncing, setBodyStatsSyncing] = useState(false);
            const [thinking, setThinking] = useState(false);
            const [selectedCoach, setSelectedCoach] = useState(null);

            useEffect(() => {
                try {
                    const userData = sessionStorage.getItem('sunnyfit_user');
                    if (userData) {
                        const parsed = JSON.parse(userData);
                        if (parsed.coach) setSelectedCoach(parsed.coach);
                    }
                } catch (e) {}
            }, []);

            const handleNext = () => {
                if (step === 5) {
                    setStep(6);
                } else if (step === 6) {
                    setThinking(true);
                    setTimeout(() => { 
                        setThinking(false);
                        setStep(7);
                    }, 2500);
                } else if (step === 7) {
                    setStep(8);
                } else { setStep(step + 1); }
            };

            const handleSyncBodyStats = () => {
                setBodyStatsSyncing(true);
                setTimeout(() => {
                    setBodyStats({ gender: 'Female', birthday: 'Feb. 02, 1981', weight: '186 lbs', height: '5 ft 06 in' });
                    setBodyStatsSyncing(false);
                }, 500);
            };

            const handleNoEquipment = () => { setSelections(prev => ({ ...prev, equip: [] })); setStep(3); };
            const toggleEquipment = (item) => setSelections(prev => ({ ...prev, equip: prev.equip.includes(item) ? prev.equip.filter(i => i !== item) : [...prev.equip, item] }));
            const toggleFocusDay = (dayId) => setSelections(prev => ({ ...prev, focusDays: prev.focusDays.includes(dayId) ? prev.focusDays.filter(i => i !== dayId) : [...prev.focusDays, dayId] }));
            const toggleBodyQuirk = (id) => setSelections(prev => ({ ...prev, bodyQuirks: prev.bodyQuirks.includes(id) ? prev.bodyQuirks.filter(i => i !== id) : [...prev.bodyQuirks, id] }));

            // 动态标题逻辑映射
            const getStrategyTitle = () => {
                if(selections.goal === 'muscle') return "Your Muscle Building Strategy";
                if(selections.goal === 'vitality') return "Your Vitality Strategy";
                if(selections.goal === 'rehab') return "Your Rehab Strategy";
                return "Your Weight Loss Strategy"; // Default
            };

            return (
                <div className="mobile-viewport bg-bg-page flex flex-col font-sans">
                    {/* Header */}
                    <div className="px-6 pt-10 pb-4 flex items-center shrink-0">
                        <button 
                            onClick={() => { if (thinking) return; step === 1 ? window.navigateTo('intent_select') : setStep(step - 1); }} 
                            className={`w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue active:scale-95 transition-all ${thinking ? 'opacity-0 pointer-events-none' : 'opacity-100'}`}
                        ><Icons.ChevronLeft /></button>
                    </div>

                    <div className="flex-1 flex flex-col overflow-y-auto no-scrollbar relative">
                        
                        {/* Step 1 - 6 */}
                        {step === 1 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_goal">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">What is your core focus?</h3>
                                    <p className="text-[14px] text-text-secondary">I will tailor your journey based on this goal.</p>
                                </div>
                                <div className="mt-8 px-6 space-y-3">
                                    {GOALS.map(g => (
                                        <div key={g.id} onClick={() => setSelections({...selections, goal: g.id})} className={`p-5 rounded-[24px] border-2 transition-all flex items-center gap-4 cursor-pointer ${selections.goal === g.id ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-sm'}`}>
                                            <span className="text-2xl">{g.icon}</span>
                                            <div className="text-left"><h4 className={`font-bold text-[15px] ${selections.goal === g.id ? 'text-brand-red' : 'text-text-primary'}`}>{g.label}</h4><p className="text-[11px] text-text-secondary">{g.sub}</p></div>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 2 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_equipment">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">Your training space?</h3>
                                    <p className="text-[14px] text-text-secondary">Select what you have available.</p>
                                </div>
                                <div className="mt-8 px-6 pb-20">
                                    <h4 className="text-[12px] font-bold text-text-secondary uppercase tracking-widest mb-3 ml-1">Cardio Machines</h4>
                                    <div className="grid grid-cols-2 gap-3 mb-6">
                                        {MAJOR_EQUIPMENT.map(e => (
                                            <div key={e} onClick={() => toggleEquipment(e)} className={`p-4 rounded-[16px] border-2 transition-all cursor-pointer flex flex-col justify-between h-20 ${selections.equip.includes(e) ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-sm'}`}>
                                                <div className={`text-[13px] font-bold leading-tight ${selections.equip.includes(e) ? 'text-brand-red' : 'text-text-primary'}`}>{e}</div>
                                                {selections.equip.includes(e) && <div className="self-end text-brand-red"><Icons.Check /></div>}
                                            </div>
                                        ))}
                                    </div>
                                    <h4 className="text-[12px] font-bold text-text-secondary uppercase tracking-widest mb-3 ml-1">Accessories</h4>
                                    <div className="flex flex-wrap gap-3">
                                        {SMALL_EQUIPMENT.map(e => (
                                            <div key={e} onClick={() => toggleEquipment(e)} className={`px-4 py-3 rounded-[16px] border-2 transition-all cursor-pointer font-bold text-[12px] ${selections.equip.includes(e) ? 'border-brand-red bg-brand-red/5 text-brand-red' : 'border-transparent bg-white shadow-sm text-text-primary'}`}>{e}</div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 3 && !thinking && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_level">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">Current Level</h3>
                                    <p className="text-[14px] text-text-secondary">Establish your starting point.</p>
                                </div>
                                <div className="mt-8 px-6 space-y-3">
                                    {LEVELS.map(l => (
                                        <div key={l.id} onClick={() => setSelections({...selections, level: l.id})} className={`p-5 rounded-[24px] border-2 transition-all flex items-center gap-4 cursor-pointer ${selections.level === l.id ? 'border-brand-red bg-brand-red/5' : 'border-transparent bg-white shadow-sm'}`}>
                                            <div className="text-left flex-1">
                                                <h4 className={`font-bold text-[15px] ${selections.level === l.id ? 'text-brand-red' : 'text-text-primary'}`}>{l.label}</h4>
                                                <p className="text-[11px] text-text-secondary">{l.sub}</p>
                                            </div>
                                            {selections.level === l.id && <div className="text-brand-red shrink-0"><Icons.Check /></div>}
                                        </div>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 4 && !thinking && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_focus_days">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">Select your Weekly Focus Days</h3>
                                    <p className="text-[14px] text-text-secondary leading-relaxed">3-4 days to push hard. I'll fill the rest with gentle recovery flows so you stay active every day.</p>
                                </div>
                                <div className="mt-8 px-6">
                                    <div className="flex justify-between gap-2">
                                        {WEEKDAYS.map((d) => (
                                            <div key={d.id} onClick={() => toggleFocusDay(d.id)} className={`w-12 h-12 rounded-full flex items-center justify-center font-bold text-[14px] transition-all cursor-pointer flex-1 max-w-[48px] ${selections.focusDays.includes(d.id) ? 'bg-brand-red text-white shadow-glow' : 'bg-white text-text-primary shadow-sm border-2 border-transparent hover:border-brand-red/30'}`}>{d.label}</div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        )}

                        {step === 5 && !thinking && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_body_quirks">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">Anything I should keep in mind?</h3>
                                </div>
                                <div className="mt-8 px-6 flex flex-wrap gap-3 justify-center">
                                    {BODY_QUIRKS.map(q => (
                                        <button key={q.id} onClick={() => toggleBodyQuirk(q.id)} className={`px-5 py-3 rounded-full border-2 transition-all font-semibold text-[13px] cursor-pointer ${selections.bodyQuirks.includes(q.id) ? 'border-brand-red bg-brand-red/5 text-brand-red' : 'border-transparent bg-white text-text-primary shadow-sm'}`}>{q.label}</button>
                                    ))}
                                </div>
                            </div>
                        )}

                        {step === 6 && !thinking && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_body_stats">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">Update your body stats</h3>
                                </div>
                                <div className="mt-8 px-6">
                                    <div className="space-y-3">
                                        {BODY_STAT_ITEMS.map(item => (
                                            <div key={item.id} className="p-4 rounded-[20px] border-2 border-transparent bg-white shadow-sm flex items-center justify-between">
                                                <div className="flex items-center gap-3">
                                                    <div className="w-10 h-10 rounded-xl bg-brand-red/10 text-brand-red flex items-center justify-center text-lg shrink-0">{item.icon}</div>
                                                    <span className="font-semibold text-[15px] text-text-primary">{item.label}</span>
                                                </div>
                                                <span className={`text-[14px] font-medium ${bodyStats[item.key] ? 'text-text-primary' : 'text-text-secondary'}`}>
                                                    {bodyStats[item.key] || 'Select'}
                                                </span>
                                            </div>
                                        ))}
                                    </div>
                                    <button onClick={handleSyncBodyStats} disabled={bodyStatsSyncing} className="mt-5 w-full py-3 flex items-center justify-center gap-2 text-text-secondary text-[14px] font-medium border border-brand-red/20 rounded-[16px] hover:bg-brand-red/5 transition-colors disabled:opacity-60">
                                        {bodyStatsSyncing ? <>Syncing...</> : <><span className="text-brand-red">❤️</span> Quick Sync From Apple Health →</>}
                                    </button>
                                </div>
                            </div>
                        )}

                        {thinking && (
                            <div className="absolute inset-0 z-50 flex flex-col items-center bg-bg-page animate-fade-up">
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6 animate-pulse-slow"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <div className="mt-10 space-y-4">
                                        <h3 className="text-[18px] font-bold text-brand-blue italic">"Analyzing goals..."</h3>
                                        <div className="flex gap-2 justify-center pt-4"><div className="w-2 h-2 bg-brand-red rounded-full animate-bounce"></div><div className="w-2 h-2 bg-brand-red rounded-full animate-bounce" style={{animationDelay:'0.2s'}}></div><div className="w-2 h-2 bg-brand-red rounded-full animate-bounce" style={{animationDelay:'0.4s'}}></div></div>
                                    </div>
                                </div>
                            </div>
                        )}

                        {/* ✅ STEP 7: 动态策略蓝图 - 恢复头部居中排版 */}
                        {step === 7 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_step_vision">
                                {/* 一致的居中头部 */}
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">{getStrategyTitle()}</h3>
                                </div>
                                
                                <div className="mt-6 px-6">
                                    {/* 动态预期曲线图 */}
                                    <div className="relative h-[240px] w-full mb-8">
                                        <div className="absolute left-[-35px] top-[40%] -translate-y-1/2 -rotate-90 text-[12px] font-bold text-text-primary tracking-widest whitespace-nowrap z-10">
                                            &uarr; Metabolic Rate
                                        </div>

                                        <svg viewBox="0 0 320 180" className="w-full h-full preserve-3d overflow-visible">
                                            <defs>
                                                <linearGradient id="curveGradient" x1="0" y1="0" x2="1" y2="0">
                                                    <stop offset="0%" stopColor="#BDD0EB" stopOpacity="0.5"/>
                                                    <stop offset="100%" stopColor="#EE4343" stopOpacity="0.15"/>
                                                </linearGradient>
                                                <linearGradient id="lineGradient" x1="0" y1="0" x2="1" y2="0">
                                                    <stop offset="0%" stopColor="#4A90E2" />
                                                    <stop offset="50%" stopColor="#A55EEA" />
                                                    <stop offset="100%" stopColor="#EE4343" />
                                                </linearGradient>
                                            </defs>
                                            
                                            <path d="M 0 150 Q 80 150, 160 110 T 320 20 L 320 180 L 0 180 Z" fill="url(#curveGradient)" className="animate-fade-up" style={{animationDuration: '1s'}} />
                                            <path d="M 0 150 Q 80 150, 160 110 T 320 20" fill="none" stroke="url(#lineGradient)" strokeWidth="4" strokeLinecap="round" className="animate-fade-up" style={{animationDuration: '1s', animationDelay: '0.2s'}} />
                                            
                                            <line x1="80" y1="150" x2="80" y2="180" stroke="#ccc" strokeDasharray="3 3" />
                                            <line x1="160" y1="110" x2="160" y2="180" stroke="#ccc" strokeDasharray="3 3" />
                                            <line x1="320" y1="20" x2="320" y2="180" stroke="#EE4343" strokeDasharray="3 3" />

                                            <circle cx="80" cy="138" r="5" fill="white" stroke="#4A90E2" strokeWidth="3" />
                                            <circle cx="160" cy="110" r="5" fill="white" stroke="#A55EEA" strokeWidth="3" />
                                            <circle cx="320" cy="20" r="7" fill="white" stroke="#EE4343" strokeWidth="4" />
                                        </svg>
                                        
                                        <div className="absolute right-[-10px] top-[-20px] text-brand-red font-extrabold text-[16px]">Goal</div>
                                        <div className="absolute left-[30px] top-[100px] text-2xl animate-pop" style={{animationDelay: '0.4s'}}>🥵</div>
                                        <div className="absolute left-[110px] top-[60px] text-4xl animate-pop" style={{animationDelay: '0.6s'}}>😌</div>
                                        <div className="absolute right-[50px] top-[10px] text-5xl animate-pop" style={{animationDelay: '0.8s'}}>🤩</div>

                                        <div className="absolute bottom-[-15px] left-[10px] w-[330px] flex justify-between text-[12px] font-bold text-text-primary">
                                            <div className="text-center leading-tight w-[80px]">Awakening<br/><span className="font-medium text-text-secondary text-[10px]">(3-7 days)</span></div>
                                            <div className="text-center leading-tight w-[80px]">Ignition<br/><span className="font-medium text-text-secondary text-[10px]">(2-3 weeks)</span></div>
                                            <div className="text-center leading-tight w-[100px]">Metabolic Shift<br/><span className="font-medium text-text-secondary text-[10px]">(after 4 weeks)</span></div>
                                        </div>
                                    </div>

                                    {/* 归因魔法文案 */}
                                    <div className="mt-14 bg-white p-5 rounded-[20px] shadow-sm border border-brand-red/10">
                                        <p className="text-[13px] text-text-primary leading-relaxed">
                                            Based on Sunny's data, the first few days are about breaking inertia. By Day 14, your body shifts into a highly efficient fat-burning machine!
                                        </p>
                                    </div>
                                </div>
                                <div className="h-24"></div>
                            </div>
                        )}

                        {/* ✅ STEP 8: 今日任务 - 恢复头部居中排版 */}
                        {step === 8 && (
                            <div className="animate-fade-up" data-zone-id="plan_create_today_tasks">
                                {/* 一致的居中头部 */}
                                <div className="flex flex-col items-center pt-2 px-8 text-center">
                                    <div className="mb-6"><SunnyLogo avatar={selectedCoach?.avatar} bgColor={selectedCoach?.color} /></div>
                                    <h3 className="text-[24px] font-bold text-text-primary leading-tight mt-2 mb-2">Let's wake up your body today, Alex</h3>
                                </div>

                                {/* Vertical Stack Sneak-Peek Timeline */}
                                <div className="relative mt-6 px-6 pb-20">
                                    {/* 🌟 Day 1 - Main Task Card */}
                                    <div className="relative z-30 bg-white rounded-[24px] shadow-[0_10px_30px_rgba(0,0,0,0.08)] border border-gray-100 p-4">
                                        <div className="flex justify-between items-center mb-3">
                                            <span className="font-bold text-text-primary text-[16px]">Day 1</span>
                                            <span className="text-text-secondary text-[13px] font-medium">Cardio • 15 min</span>
                                        </div>
                                        <div className="w-full h-[200px] rounded-[16px] bg-cover bg-center relative overflow-hidden shadow-inner" style={{backgroundImage: `url('https://images.unsplash.com/photo-1534438327276-14e5300c3a48?auto=format&fit=crop&w=600&q=80')`}}>
                                            <div className="absolute inset-0 bg-gradient-to-t from-black/80 via-black/20 to-transparent"></div>
                                            <div className="absolute bottom-4 left-4 text-white pr-4">
                                                <h4 className="font-bold text-[18px] leading-snug">15-Min Fun Running to Warmup</h4>
                                                <div className="flex items-center gap-2 mt-2">
                                                    <span className="text-[12px] opacity-90">15 min</span>
                                                    <span className="text-[10px] opacity-60">|</span>
                                                    <span className="text-[12px] opacity-90">Beginner</span>
                                                </div>
                                            </div>
                                        </div>
                                    </div>

                                    {/* 🌟 Day 2 - Peek Card */}
                                    <div className="relative z-20 bg-[#F5F7FA] rounded-b-[24px] mx-4 -mt-4 pt-8 pb-4 px-5 shadow-sm border border-gray-100 flex justify-between items-center">
                                        <span className="font-bold text-text-secondary text-[14px]">Day 2</span>
                                        <span className="text-text-secondary font-medium text-[14px]">Strength</span>
                                    </div>

                                    {/* 🌟 Day 3 - Peek Card */}
                                    <div className="relative z-10 bg-[#F0F2F5] rounded-b-[24px] mx-8 -mt-4 pt-8 pb-4 px-5 shadow-sm border border-white/50 flex justify-between items-center opacity-60">
                                        <span className="font-bold text-gray-400 text-[14px]">Day 3</span>
                                        <span className="text-gray-400 font-medium text-[14px]">Active Recovery</span>
                                    </div>
                                </div>
                            </div>
                        )}
                    </div>

                    {/* Bottom CTA Area */}
                    <div className="px-6 pb-12 pt-4 bg-gradient-to-t from-bg-page via-bg-page to-transparent shrink-0 z-50">
                        {step === 1 && (
                            <button onClick={handleNext} disabled={!selections.goal} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-30">Continue</button>
                        )}
                        {step === 2 && (
                            <>
                                <button onClick={handleNext} disabled={selections.equip.length === 0} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-30">Continue</button>
                                <button onClick={handleNoEquipment} className="mt-3 w-full py-3 text-text-secondary text-[14px] font-medium underline hover:text-brand-red transition-colors">No Equipment</button>
                            </>
                        )}
                        {step >= 3 && step <= 4 && !thinking && (
                            <button onClick={handleNext} disabled={step === 3 && !selections.level} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 transition-all disabled:opacity-30">Continue</button>
                        )}
                        {step === 5 && !thinking && (
                            <button onClick={handleNext} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95">Continue</button>
                        )}
                        {step === 6 && !thinking && (
                            <button onClick={handleNext} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95">Generate My AI Plan</button>
                        )}
                        {step === 7 && (
                            <button onClick={handleNext} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn active:scale-95 animate-pop">See Today's Tasks</button>
                        )}
                        {step === 8 && (
                            <button 
                                onClick={() => window.navigateTo('workout_prepare')}
                                className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn animate-pop" 
                            >
                                Start Workout
                            </button>
                        )}
                    </div>
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
