<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunnyFit: Workout Prepare</title>

    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>

    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800;900&display=swap" rel="stylesheet">

    <script>
        function navigateTo(targetPageId) {
            const cleanId = (targetPageId || '').replace(/\.html$/, '');
            try {
                if (window.parent !== window && window.parent.location.search.includes('page=')) {
                    const parentParams = new URLSearchParams(window.parent.location.search);
                    parentParams.set('page', cleanId);
                    window.parent.location.search = parentParams.toString();
                    return;
                }
            } catch (e) {
                console.warn("非 Shell 环境，准备执行物理跳转");
            }
            const targetFile = cleanId + '.html';
            if (!window.location.pathname.endsWith(targetFile)) {
                window.location.href = targetFile;
            }
        }
        if (typeof window !== 'undefined') window.navigateTo = navigateTo;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { red: '#EE4343', blue: '#2D4183', beige: '#F6E2CF', green: '#34C759' },
                        bg: { page: '#FFFBF7', card: '#FFFFFF', neutral: '#F5F7FA' }
                    },
                    fontFamily: { sans: ['Montserrat', 'system-ui', 'sans-serif'] },
                    boxShadow: {
                        'card': '0px 4px 12px rgba(0, 0, 0, 0.05)',
                        'float-btn': '0px 10px 40px rgba(238, 67, 67, 0.4)'
                    },
                    borderRadius: { card: '20px', btn: '16px' },
                    animation: {
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'slide-up': 'slideUp 0.35s ease-out forwards'
                    },
                    keyframes: {
                        fadeUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideUp: { '0%': { transform: 'translateY(100%)', opacity: '0' }, '100%': { transform: 'translateY(0)', opacity: '1' } }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; min-height: 100vh; overflow: hidden; font-family: 'Montserrat', system-ui, sans-serif; }
        .mobile-viewport { width: 390px; height: 844px; background-color: #FFFBF7; position: relative; overflow: hidden; border-radius: 40px; border: 8px solid #333; box-shadow: 0px 30px 60px rgba(0,0,0,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            ChevronLeft: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m15 18-6-6 6-6"/></svg>,
            Check: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>,
            Bike: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><circle cx="5.5" cy="17.5" r="3.5"/><circle cx="18.5" cy="17.5" r="3.5"/><path d="M15 6a1 1 0 0 0 1-1V4a1 1 0 0 0-2 0v1a1 1 0 0 0 1 1z"/><path d="M12 17.5V14l-3-3 4-3 2 3h2"/></svg>,
            Heart: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><path d="M20.84 4.61a5.5 5.5 0 0 0-7.78 0L12 5.67l-1.06-1.06a5.5 5.5 0 0 0-7.78 7.78l1.06 1.06L12 21.23l7.78-7.78 1.06-1.06a5.5 5.5 0 0 0 0-7.78z"/></svg>,
            Settings: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" className={className}><circle cx="12" cy="12" r="3"/><path d="M19.4 15a1.65 1.65 0 0 0 .33 1.82l.06.06a2 2 0 0 1 0 2.83 2 2 0 0 1-2.83 0l-.06-.06a1.65 1.65 0 0 0-1.82-.33 1.65 1.65 0 0 0-1 1.51V21a2 2 0 0 1-2 2 2 2 0 0 1-2-2v-.09A1.65 1.65 0 0 0 9 19.4a1.65 1.65 0 0 0-1.82.33l-.06.06a2 2 0 0 1-2.83 0 2 2 0 0 1 0-2.83l.06-.06a1.65 1.65 0 0 0 .33-1.82 1.65 1.65 0 0 0-1.51-1H3a2 2 0 0 1-2-2 2 2 0 0 1 2-2h.09A1.65 1.65 0 0 0 4.6 9a1.65 1.65 0 0 0-.33-1.82l-.06-.06a2 2 0 0 1 0-2.83 2 2 0 0 1 2.83 0l.06.06a1.65 1.65 0 0 0 1.82.33H9a1.65 1.65 0 0 0 1-1.51V3a2 2 0 0 1 2-2 2 2 0 0 1 2 2v.09a1.65 1.65 0 0 0 1 1.51 1.65 1.65 0 0 0 1.82-.33l.06-.06a2 2 0 0 1 2.83 0 2 2 0 0 1 0 2.83l-.06.06a1.65 1.65 0 0 0-.33 1.82V9a1.65 1.65 0 0 0 1.51 1H21a2 2 0 0 1 2 2 2 2 0 0 1-2 2h-.09a1.65 1.65 0 0 0-1.51 1z"/></svg>,
            Play: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="currentColor" stroke="none" className={className}><polygon points="5 3 19 12 5 21 5 3"/></svg>,
            Loader: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            X: ({ className }) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M18 6 6 18"/><path d="m6 6 12 12"/></svg>
        };

        const STORAGE_KEY_MAIN = 'workout_prepare_last_main_device';
        const CONNECT_TIMEOUT_MS = 10000;

        const COVER_IMAGE = 'https://images.unsplash.com/photo-1518611012118-696072aa579a?w=400&h=400&fit=crop';
        const PROGRAM_MODES = [
            { id: 'manual', name: 'Manual', desc: 'Free ride mode' },
            { id: 'fat_burn', name: 'Fat Burn', desc: 'Zone 2 cardio' },
            { id: 'interval', name: 'Interval', desc: 'HIIT training' }
        ];
        const MOCK_DEVICES = [
            { id: 'sb-100', name: 'Sunny Bike SB-100', model: 'SF-E3955', icon: '🚲' },
            { id: 'hr-band', name: 'HR Band Pro', model: 'SF-HR001', icon: '💓' }
        ];

        const getLastMainDevice = () => {
            try {
                const s = localStorage.getItem(STORAGE_KEY_MAIN);
                return s ? JSON.parse(s) : null;
            } catch { return null; }
        };
        const saveLastMainDevice = (d) => {
            try { if (d) localStorage.setItem(STORAGE_KEY_MAIN, JSON.stringify(d)); else localStorage.removeItem(STORAGE_KEY_MAIN); } catch (_) {}
        };

        const WorkoutPreparePage = () => {
            const [mainConnState, setMainConnState] = useState('idle'); // idle|scanning|connecting|connected|failed
            const [lastMainDevice, setLastMainDevice] = useState(() => getLastMainDevice());
            const [mainDeviceInfo, setMainDeviceInfo] = useState(null); // current connected device info
            const [hrConnected, setHrConnected] = useState(false);
            const [showDeviceModal, setShowDeviceModal] = useState(null); // 'main' | 'hr' | null
            const [mainModalView, setMainModalView] = useState('status'); // 'status' | 'scan'
            const [showModeModal, setShowModeModal] = useState(false);
            const [modeTab, setModeTab] = useState('program');
            const [selectedProgram, setSelectedProgram] = useState('manual');
            const [customTarget, setCustomTarget] = useState({ type: 'time', value: 30 });
            const [customValue, setCustomValue] = useState(30);
            const [bubbleMessage, setBubbleMessage] = useState(null);
            const connectTimeoutRef = React.useRef(null);

            const disconnectMain = () => {
                setMainConnState('idle');
                setMainDeviceInfo(null);
            };

            const startAutoConnect = () => {
                if (!lastMainDevice) return;
                const dev = MOCK_DEVICES.find(d => d.id === lastMainDevice.id) || { id: lastMainDevice.id, name: lastMainDevice.name || 'Device', model: lastMainDevice.model || '', icon: '🚲' };
                setMainConnState('connecting');
                connectTimeoutRef.current = setTimeout(() => {
                    setMainConnState('failed');
                }, CONNECT_TIMEOUT_MS);
                setTimeout(() => {
                    if (connectTimeoutRef.current) {
                        clearTimeout(connectTimeoutRef.current);
                        connectTimeoutRef.current = null;
                        setMainConnState('connected');
                        setMainDeviceInfo(dev);
                    }
                }, 2500);
            };

            const startScanOnly = () => {
                setMainConnState('scanning');
                setTimeout(() => {
                    setBubbleMessage('Found Sunny Bike SB-100');
                    setTimeout(() => setBubbleMessage(null), 3000);
                }, 3000);
            };

            useEffect(() => {
                if (lastMainDevice) {
                    startAutoConnect();
                    return () => { if (connectTimeoutRef.current) clearTimeout(connectTimeoutRef.current); };
                }
                startScanOnly();
            }, []);

            const handleBack = () => {
                disconnectMain();
                if (typeof window.parent?.postMessage === 'function') {
                    window.parent.postMessage({ type: 'ZONE_CLICK', zoneId: 'workout_prepare_header_back' }, '*');
                }
                window.navigateTo('plan_dashboard');
            };

            const handleStartWorkout = () => {
                disconnectMain();
                if (typeof window.parent?.postMessage === 'function') {
                    window.parent.postMessage({ type: 'ZONE_CLICK', zoneId: 'workout_prepare_cta_start' }, '*');
                }
                window.navigateTo('free_mode');
            };

            const openMainDeviceModal = () => {
                if (typeof window.parent?.postMessage === 'function') {
                    window.parent.postMessage({ type: 'ZONE_CLICK', zoneId: 'workout_prepare_device_main' }, '*');
                }
                setMainModalView('status');
                setShowDeviceModal('main');
            };

            const openHrModal = () => {
                if (typeof window.parent?.postMessage === 'function') {
                    window.parent.postMessage({ type: 'ZONE_CLICK', zoneId: 'workout_prepare_device_hr' }, '*');
                }
                setShowDeviceModal('hr');
            };

            const handleSwitchEquipment = () => {
                if (connectTimeoutRef.current) { clearTimeout(connectTimeoutRef.current); connectTimeoutRef.current = null; }
                setMainConnState('scanning');
                setMainModalView('scan');
            };

            const handleRetryMain = () => {
                if (lastMainDevice) startAutoConnect();
                setMainModalView('status');
            };

            const handleDisconnectMain = () => {
                if (connectTimeoutRef.current) { clearTimeout(connectTimeoutRef.current); connectTimeoutRef.current = null; }
                disconnectMain();
                setMainModalView('scan');
            };

            const handleConnectMain = (dev) => {
                const rec = { id: dev.id, name: dev.name, model: dev.model };
                saveLastMainDevice(rec);
                setLastMainDevice(rec);
                setMainDeviceInfo(dev);
                setMainConnState('connected');
                setShowDeviceModal(null);
                setMainModalView('status');
            };

            const handleConnectHr = () => { setHrConnected(true); setShowDeviceModal(null); };

            return (
                <div className="mobile-viewport flex flex-col bg-bg-page">
                    {/* 1.1 Header */}
                    <header className="shrink-0 px-4 pt-10 pb-3 flex items-center" data-zone-id="workout_prepare_header">
                        <button onClick={handleBack} className="w-10 h-10 rounded-full bg-bg-card shadow-card flex items-center justify-center text-brand-blue" aria-label="Back" data-zone-id="workout_prepare_header_back">
                            <Icons.ChevronLeft className="w-6 h-6" />
                        </button>
                        <h1 className="flex-1 text-center text-[20px] leading-6 font-normal text-black/90 mr-10">Workout Prepare</h1>
                    </header>

                    <main className="flex-1 overflow-y-auto no-scrollbar px-4 pb-6">
                        {/* 1.2 Workout cover (1:1) */}
                        <section className="w-full aspect-square rounded-card overflow-hidden shadow-card mb-4" data-zone-id="workout_prepare_cover">
                            <img src={COVER_IMAGE} alt="Workout" className="w-full h-full object-cover" />
                        </section>

                        {/* 1.3 Device connection buttons: left main, right HR */}
                        <section className="flex gap-3 mb-4 relative" data-zone-id="workout_prepare_devices">
                            {bubbleMessage && (
                                <div className="absolute -top-2 left-0 right-0 mx-4 px-4 py-2 bg-brand-blue text-white text-[12px] font-medium rounded-btn text-center z-10 animate-fade-up" data-zone-id="workout_prepare_bubble">
                                    {bubbleMessage}
                                </div>
                            )}
                            <button
                                onClick={openMainDeviceModal}
                                className="flex-1 flex flex-col items-center justify-center gap-2 p-4 bg-bg-card rounded-card shadow-card min-h-[88px]"
                                data-zone-id="workout_prepare_device_main"
                            >
                                <div className="relative">
                                    {mainConnState === 'connected' ? (
                                        <span className="text-3xl">{mainDeviceInfo?.icon || '🚲'}</span>
                                    ) : mainConnState === 'connecting' || mainConnState === 'scanning' ? (
                                        <Icons.Loader className="w-10 h-10 text-brand-blue animate-spin" />
                                    ) : mainConnState === 'failed' ? (
                                        <Icons.Bike className="w-10 h-10 text-black/40" />
                                    ) : (
                                        <Icons.Bike className="w-10 h-10 text-black/40" />
                                    )}
                                    {mainConnState === 'connected' && (
                                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-brand-green rounded-full flex items-center justify-center">
                                            <Icons.Check className="w-3 h-3 text-white" strokeWidth={4} />
                                        </span>
                                    )}
                                    {mainConnState === 'failed' && (
                                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-[#FF3B30] rounded-full flex items-center justify-center">
                                            <Icons.X className="w-3 h-3 text-white" />
                                        </span>
                                    )}
                                </div>
                                <span className="text-[12px] leading-4 text-black/60">
                                    {mainConnState === 'connected' ? 'Connected' : mainConnState === 'connecting' ? 'Connecting...' : mainConnState === 'scanning' ? 'Scanning...' : mainConnState === 'failed' ? 'Connection Failed' : lastMainDevice ? (lastMainDevice.model || 'Main Device') : 'Main Device'}
                                </span>
                            </button>
                            <button
                                onClick={openHrModal}
                                className="flex-1 flex flex-col items-center justify-center gap-2 p-4 bg-bg-card rounded-card shadow-card min-h-[88px]"
                                data-zone-id="workout_prepare_device_hr"
                            >
                                <div className="relative">
                                    <Icons.Heart className={`w-10 h-10 ${hrConnected ? 'text-brand-green' : 'text-black/40'}`} />
                                    {hrConnected && (
                                        <span className="absolute -top-1 -right-1 w-5 h-5 bg-brand-green rounded-full flex items-center justify-center">
                                            <Icons.Check className="w-3 h-3 text-white" strokeWidth={4} />
                                        </span>
                                    )}
                                </div>
                                <span className="text-[12px] leading-4 text-black/60">{hrConnected ? 'Connected' : 'Heart Rate'}</span>
                            </button>
                        </section>

                        {/* 1.4 Mode settings - circular entry */}
                        <section className="flex items-center gap-3 mb-6" data-zone-id="workout_prepare_mode">
                            <button
                                onClick={() => { setShowModeModal(true); if (typeof window.parent?.postMessage === 'function') window.parent.postMessage({ type: 'ZONE_CLICK', zoneId: 'workout_prepare_mode_entry' }, '*'); }}
                                className="w-16 h-16 rounded-full bg-bg-card shadow-card flex items-center justify-center text-brand-blue shrink-0"
                                data-zone-id="workout_prepare_mode_entry"
                            >
                                <Icons.Settings className="w-8 h-8" />
                            </button>
                            <div className="flex-1">
                                <p className="text-[14px] leading-[22px] font-bold text-black/90">Workout Mode</p>
                                <p className="text-[12px] leading-4 text-black/60">
                                    {modeTab === 'custom' ? `${customTarget.type}: ${customValue}` : PROGRAM_MODES.find(m => m.id === selectedProgram)?.name || 'Manual'}
                                </p>
                            </div>
                        </section>

                        {/* 1.5 Start entrance */}
                        <button
                            onClick={handleStartWorkout}
                            className="w-full h-14 bg-brand-red text-white rounded-btn font-bold text-base shadow-float-btn active:scale-[0.98] transition-transform"
                            data-zone-id="workout_prepare_cta_start"
                        >
                            Start Workout
                        </button>
                    </main>

                    {/* Half-screen device modal - Main */}
                    {showDeviceModal === 'main' && (
                        <div className="absolute inset-0 z-50 flex items-end bg-black/40" onClick={() => setShowDeviceModal(null)} data-zone-id="workout_prepare_modal_main">
                            <div className="w-full max-h-[50vh] bg-bg-card rounded-t-[20px] p-4 animate-slide-up overflow-y-auto no-scrollbar" onClick={e => e.stopPropagation()} data-zone-id="workout_prepare_modal_main_content">
                                <div className="w-10 h-1 bg-black/20 rounded-full mx-auto mb-4" />
                                <h3 className="text-[16px] leading-6 font-black text-brand-blue mb-3">Main Device</h3>
                                {mainModalView === 'status' ? (
                                    <>
                                        <div className="mb-4 p-4 bg-bg-neutral rounded-btn">
                                            <p className="text-[12px] text-black/60 mb-1">Status</p>
                                            <p className="text-[14px] font-semibold text-black/90">
                                                {mainConnState === 'connecting' && 'Connecting...'}
                                                {mainConnState === 'scanning' && 'Scanning...'}
                                                {mainConnState === 'connected' && (mainDeviceInfo ? `${mainDeviceInfo.name} (${mainDeviceInfo.model})` : 'Connected')}
                                                {mainConnState === 'failed' && 'Connection failed (timeout)'}
                                                {mainConnState === 'idle' && (lastMainDevice ? lastMainDevice.model : 'Scanning...')}
                                            </p>
                                        </div>
                                        {(mainConnState === 'failed') ? (
                                            <button onClick={handleRetryMain} className="w-full py-3.5 bg-brand-blue text-white rounded-btn font-bold mb-2" data-zone-id="workout_prepare_main_retry">Retry</button>
                                        ) : (
                                            <button onClick={handleSwitchEquipment} className="w-full py-3.5 bg-bg-neutral text-brand-blue font-bold rounded-btn mb-2" data-zone-id="workout_prepare_main_switch">Switch Equipment</button>
                                        )}
                                    </>
                                ) : (
                                    <>
                                        <p className="text-[12px] text-black/60 mb-3">Select a device to connect</p>
                                        <div className="space-y-2 mb-4">
                                            {MOCK_DEVICES.filter(d => d.id === 'sb-100').map(d => (
                                                <button key={d.id} onClick={() => handleConnectMain(d)} className="w-full flex items-center justify-between p-4 bg-bg-neutral rounded-btn text-left" data-zone-id="workout_prepare_main_connect">
                                                    <div className="flex items-center gap-3">
                                                        <span className="text-2xl">{d.icon}</span>
                                                        <div>
                                                            <p className="text-[14px] font-semibold text-black/90">{d.name}</p>
                                                            <p className="text-[12px] text-black/60">{d.model}</p>
                                                        </div>
                                                    </div>
                                                    <span className="text-brand-blue font-semibold text-[12px]">Connect</span>
                                                </button>
                                            ))}
                                        </div>
                                    </>
                                )}
                                <button onClick={() => setShowDeviceModal(null)} className="w-full py-3 text-[14px] font-semibold text-black/60" data-zone-id="workout_prepare_modal_close">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Half-screen device modal - HR */}
                    {showDeviceModal === 'hr' && (
                        <div className="absolute inset-0 z-50 flex items-end bg-black/40" onClick={() => setShowDeviceModal(null)} data-zone-id="workout_prepare_modal_hr">
                            <div className="w-full max-h-[50vh] bg-bg-card rounded-t-[20px] p-4 animate-slide-up overflow-y-auto no-scrollbar" onClick={e => e.stopPropagation()} data-zone-id="workout_prepare_modal_hr_content">
                                <div className="w-10 h-1 bg-black/20 rounded-full mx-auto mb-4" />
                                <h3 className="text-[16px] leading-6 font-black text-brand-blue mb-3">Heart Rate</h3>
                                <div className="space-y-2 mb-4">
                                    {MOCK_DEVICES.filter(d => d.id === 'hr-band').map(d => (
                                        <div key={d.id} className="flex items-center justify-between p-4 bg-bg-neutral rounded-btn">
                                            <div className="flex items-center gap-3">
                                                <span className="text-2xl">{d.icon}</span>
                                                <div>
                                                    <p className="text-[14px] font-semibold text-black/90">{d.name}</p>
                                                    <p className="text-[12px] text-black/60">{d.model}</p>
                                                </div>
                                            </div>
                                            {hrConnected ? (
                                                <button onClick={() => { setHrConnected(false); setShowDeviceModal(null); }} className="px-4 py-2 text-[12px] font-semibold text-brand-red" data-zone-id="workout_prepare_hr_disconnect">Disconnect</button>
                                            ) : (
                                                <button onClick={handleConnectHr} className="px-4 py-2 bg-brand-blue text-white rounded-lg text-[12px] font-semibold" data-zone-id="workout_prepare_hr_connect">Connect</button>
                                            )}
                                        </div>
                                    ))}
                                </div>
                                <button onClick={() => setShowDeviceModal(null)} className="w-full py-3 text-[14px] font-semibold text-black/60" data-zone-id="workout_prepare_modal_close">Close</button>
                            </div>
                        </div>
                    )}

                    {/* Mode selection modal */}
                    {showModeModal && (
                        <div className="absolute inset-0 z-50 flex items-end bg-black/40" onClick={() => setShowModeModal(false)} data-zone-id="workout_prepare_modal_mode">
                            <div className="w-full max-h-[55vh] bg-bg-card rounded-t-[20px] p-4 animate-slide-up overflow-y-auto no-scrollbar" onClick={e => e.stopPropagation()} data-zone-id="workout_prepare_modal_mode_content">
                                <div className="w-10 h-1 bg-black/20 rounded-full mx-auto mb-4" />
                                <h3 className="text-[16px] leading-6 font-black text-brand-blue mb-3">Workout Mode</h3>
                                <div className="flex gap-2 mb-4">
                                    <button onClick={() => setModeTab('program')} className={`flex-1 py-2.5 rounded-btn text-[14px] font-semibold ${modeTab === 'program' ? 'bg-brand-blue text-white' : 'bg-bg-neutral text-black/70'}`} data-zone-id="workout_prepare_mode_program">Program</button>
                                    <button onClick={() => setModeTab('custom')} className={`flex-1 py-2.5 rounded-btn text-[14px] font-semibold ${modeTab === 'custom' ? 'bg-brand-blue text-white' : 'bg-bg-neutral text-black/70'}`} data-zone-id="workout_prepare_mode_custom">Custom</button>
                                </div>
                                {modeTab === 'program' ? (
                                    <div className="space-y-2">
                                        {PROGRAM_MODES.map(m => (
                                            <button key={m.id} onClick={() => { setSelectedProgram(m.id); setShowModeModal(false); }} className="w-full flex flex-col items-start p-4 bg-bg-neutral rounded-btn text-left" data-zone-id={`workout_prepare_program_${m.id}`}>
                                                <p className="text-[14px] font-bold text-black/90">{m.name}</p>
                                                <p className="text-[12px] text-black/60">{m.desc}</p>
                                            </button>
                                        ))}
                                    </div>
                                ) : (
                                    <div className="space-y-4">
                                        <div>
                                            <label className="text-[12px] font-semibold text-black/60 block mb-2">Target Type</label>
                                            <div className="flex gap-2">
                                                {['time', 'distance', 'calories'].map(t => (
                                                    <button key={t} onClick={() => setCustomTarget(prev => ({ ...prev, type: t }))} className={`flex-1 py-2.5 rounded-btn text-[12px] font-semibold capitalize ${customTarget.type === t ? 'bg-brand-blue text-white' : 'bg-bg-neutral text-black/70'}`} data-zone-id={`workout_prepare_custom_${t}`}>{t}</button>
                                                ))}
                                            </div>
                                        </div>
                                        <div>
                                            <label className="text-[12px] font-semibold text-black/60 block mb-2">Value</label>
                                            <input type="number" value={customValue} onChange={e => setCustomValue(Number(e.target.value) || 0)} min={1} max={999} className="w-full h-12 px-4 bg-bg-neutral rounded-btn text-[14px] font-medium outline-none" data-zone-id="workout_prepare_custom_value" />
                                        </div>
                                        <button onClick={() => setShowModeModal(false)} className="w-full py-3 bg-brand-red text-white rounded-btn font-bold" data-zone-id="workout_prepare_mode_confirm">Confirm</button>
                                    </div>
                                )}
                                <button onClick={() => setShowModeModal(false)} className="w-full py-3 mt-2 text-[14px] font-semibold text-black/60" data-zone-id="workout_prepare_modal_close">Close</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<WorkoutPreparePage />);
    </script>
</body>
</html>
