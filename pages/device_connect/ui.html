<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>SunnyFit: Device Connect (SOP 2.0)</title>
    
    <script crossorigin src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script crossorigin src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;500;600;700;800&display=swap" rel="stylesheet">

    <script>
        // SOP 2.0 MapsTo 跨级路由
        function navigateTo(targetPageId) {
            try {
                const parentParams = new URLSearchParams(window.parent.location.search);
                parentParams.set('page', targetPageId);
                window.parent.location.search = parentParams.toString();
            } catch (e) {
                console.warn("未检测到 Viewer 外壳，执行降级跳转");
                alert("SOP 路由触发：即将前往 -> " + targetPageId);
            }
        }
        if (typeof window !== 'undefined') window.navigateTo = navigateTo;
    </script>

    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        brand: { red: '#EE4343', blue: '#31426D', beige: '#F6E2CF', green: '#2BA471', darkRed: '#8B0000', sky: '#BDD0EB' },
                        bg: { page: '#FFFBF7', card: '#FFFFFF', neutral: '#F5F7FA', dark: '#1A1A1A' },
                        text: { primary: '#31426D', secondary: '#666666', inverse: '#FFFFFF' }
                    },
                    fontFamily: { sans: ['Montserrat', 'sans-serif'] },
                    boxShadow: {
                        'glow': '0px 10px 30px rgba(222, 37, 41, 0.4)',
                        'card': '0px 4px 12px rgba(0, 0, 0, 0.05)',
                        'card-active': '0px 20px 40px rgba(139, 0, 0, 0.2)',
                        'float-btn': '0px 10px 40px rgba(238, 67, 67, 0.4)'
                    },
                    animation: {
                        'breathe': 'breathe 4s ease-in-out infinite',
                        'heartbeat': 'heartbeat 0.8s ease-in-out infinite',
                        'fade-up': 'fadeUp 0.5s cubic-bezier(0.2, 0.8, 0.2, 1) forwards',
                        'slide-in': 'slideIn 0.4s ease-out forwards',
                        'radar': 'radarPing 2.5s cubic-bezier(0, 0, 0.2, 1) infinite',
                        'pop': 'pop 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275) forwards'
                    },
                    keyframes: {
                        breathe: { '0%, 100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.05)' } },
                        heartbeat: { '0%, 100%': { transform: 'scale(1)' }, '50%': { transform: 'scale(1.08)' } },
                        fadeUp: { '0%': { opacity: '0', transform: 'translateY(20px)' }, '100%': { opacity: '1', transform: 'translateY(0)' } },
                        slideIn: { '0%': { opacity: '0', transform: 'translateX(20px)' }, '100%': { opacity: '1', transform: 'translateX(0)' } },
                        radarPing: { '0%': { transform: 'scale(0.8)', opacity: '0.8' }, '75%, 100%': { transform: 'scale(2.5)', opacity: '0' } },
                        pop: { '0%': { transform: 'scale(0.95)' }, '50%': { transform: 'scale(1.02)' }, '100%': { transform: 'scale(1)' } }
                    }
                }
            }
        }
    </script>
    <style>
        * { -webkit-tap-highlight-color: transparent; }
        body { margin: 0; background-color: #f0f0f0; display: flex; justify-content: center; align-items: center; height: 100vh; overflow: hidden; font-family: 'Montserrat', sans-serif; }
        .mobile-viewport { width: 390px; height: 844px; background-color: #FFFBF7; position: relative; overflow: hidden; border-radius: 40px; border: 8px solid #333; box-shadow: 0px 30px 60px rgba(0,0,0,0.3); }
        .no-scrollbar::-webkit-scrollbar { display: none; }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect } = React;

        const Icons = {
            Bluetooth: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="m7 7 10 10-5 5V2l5 5L7 17"/></svg>,
            Check: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M20 6 9 17l-5-5"/></svg>,
            Loader: ({className}) => <svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round" className={className}><path d="M21 12a9 9 0 1 1-6.219-8.56"/></svg>,
            ChevronLeft: () => <svg className="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path strokeLinecap="round" strokeLinejoin="round" strokeWidth="2" d="M15 19l-7-7 7-7"/></svg>
        };

        const SunnyLogo = ({ className = "" }) => {
            return (
                <div className="w-full h-full animate-breathe">
                    <svg viewBox="0 0 32 32" fill="none" className={`w-full h-full drop-shadow-glow ${className}`}>
                        <path d="M16.013 32C13.271 31.9018 10.5412 31.8755 7.87463 31.1231C3.57228 29.9252 1.23878 26.956 0.52873 22.6889C-0.165498 18.3226 -0.176144 13.8749 0.497173 9.50531C1.23001 4.58405 4.38577 1.32017 9.29472 0.537958C13.609 -0.165525 18.0077 -0.17914 22.3262 0.497619C27.7401 1.35875 30.6837 4.27187 31.513 9.76137C32.1817 14.0582 32.1521 18.4348 31.4253 22.7222C30.5207 27.9048 27.3527 30.867 22.079 31.558C20.0716 31.8176 18.0362 31.8597 16.013 32Z" fill="#EE4343" />
                        <path d="M15.3836 6.16027C15.9406 6.15315 16.4468 6.48357 16.6646 6.99654C16.8824 7.50952 16.7687 8.10332 16.3767 8.49943C15.9848 8.89555 15.3925 9.01542 14.8774 8.80283C14.3624 8.59024 14.027 8.08735 14.0283 7.53001C14.0358 6.78206 14.636 6.1754 15.3836 6.16027Z" fill="#FFFFFF" />
                        <path d="M19.6492 11.387C18.5149 11.7676 17.3455 12.0377 16.2287 12.4744C15.8322 12.6166 15.4556 12.8094 15.1084 13.0479C13.9776 13.8722 13.939 14.9315 14.9611 15.9768C15.7606 16.7959 16.7231 17.4115 17.5769 18.1586C18.9041 19.3214 18.9637 20.5245 17.7312 21.8118C16.4829 23.1255 14.905 23.9726 13.2676 24.6811C12.5908 24.974 11.8983 25.2283 11.2128 25.5002C11.0314 25.3255 10.9531 25.0694 11.0059 24.8232C12.0619 24.4117 13.0326 23.8082 13.8689 23.043C14.3759 22.5899 14.8315 22.0823 15.2276 21.5295C16.092 20.3018 16.0446 19.5722 15.0523 18.4445C14.3405 17.6412 13.5095 16.945 12.9134 16.0365C11.7317 14.2335 12.2928 12.0623 14.1722 10.9977C15.6747 10.1471 17.2876 9.58586 18.9234 9.06848C19.6106 8.85451 20.1226 9.11759 20.3259 9.7402C20.5766 10.5312 20.34 11.159 19.6492 11.387Z" fill="#FFFFFF" />
                    </svg>
                </div>
            );
        };

        const DeviceConnectionFlow = () => {
            const [flowStep, setFlowStep] = useState('prep');
            const [showModal, setShowModal] = useState(false);
            const [showScanFailedModal, setShowScanFailedModal] = useState(false);
            const [isFound, setIsFound] = useState(false);
            const [connState, setConnState] = useState('idle');
            const [searchModel, setSearchModel] = useState('');
            const [connectedSuccess, setConnectedSuccess] = useState(false);

            // 10s 扫描超时
            useEffect(() => {
                if (flowStep !== 'scanning' || isFound) return;
                const t = setTimeout(() => setShowScanFailedModal(true), 10000);
                return () => clearTimeout(t);
            }, [flowStep, isFound]);

            const handleAllowPermission = () => {
                setShowModal(false);
                setFlowStep('scanning');
                setTimeout(() => setIsFound(true), 3000);
            };

            const handleConnect = () => {
                setConnState('connecting');
                setTimeout(() => {
                    setConnState('connected');
                    setTimeout(() => setConnectedSuccess(true), 1200);
                }, 1500);
            };

            const checkModel = () => {
                if (!searchModel) return;
                const isSmart = searchModel.toUpperCase().trim() === 'SF-0001';
                setFlowStep(isSmart ? 'check_bt' : 'incompatible');
            };

            return (
                <div className="absolute inset-0 z-50 bg-bg-page flex flex-col animate-slide-in">
                    <div className="px-6 pt-10 pb-4 flex items-center shrink-0" data-zone-id="device_connect_header" data-prd-zone="device_connect_header">
                        <button onClick={() => window.navigateTo('intent_select')} className="w-10 h-10 rounded-full bg-white shadow-sm flex items-center justify-center text-brand-blue">
                            <Icons.ChevronLeft />
                        </button>
                    </div>

                    <div className="flex-1 flex flex-col items-center px-6 pt-8 overflow-y-auto no-scrollbar">
                        {flowStep === 'prep' && (
                            <div className="text-center animate-fade-up w-full" data-zone-id="device_connect_prep" data-prd-zone="device_connect_prep">
                                <div className="w-[120px] h-[120px] mb-8 relative mx-auto">
                                    <div className="absolute inset-0 bg-brand-red/10 rounded-full animate-radar scale-75"></div>
                                    <div className="relative z-10 w-full h-full"><SunnyLogo /></div>
                                </div>
                                <h3 className="text-[20px] font-bold mb-3" data-i18n="device_prep_title">Power on your device</h3>
                                <p className="text-[14px] text-text-secondary px-6" data-i18n="device_prep_subtitle">Ensure your equipment is within 5 meters and plugged in.</p>
                            </div>
                        )}

                        {flowStep === 'scanning' && !connectedSuccess && (
                            <div className="w-full text-center animate-fade-up" data-zone-id="device_connect_scanning" data-prd-zone="device_connect_scanning">
                                <div className="relative flex items-center justify-center w-[200px] h-[200px] mx-auto mb-8">
                                    <div className="absolute border border-brand-red/20 rounded-full w-full h-full animate-radar"></div>
                                    <div className="relative z-10 w-16 h-16 bg-white rounded-full shadow-md flex items-center justify-center text-brand-red"><Icons.Bluetooth className="w-8 h-8"/></div>
                                </div>
                                {isFound ? (
                                    <div onClick={handleConnect} data-zone-id="device_connect_branch_equipment" data-prd-zone="device_connect_branch_equipment" className={`w-full rounded-[20px] p-5 flex items-center border bg-white shadow-card animate-pop cursor-pointer ${connState === 'connected' ? 'border-brand-green' : 'border-transparent'}`}>
                                        <div className={`w-[48px] h-[48px] rounded-[16px] flex items-center justify-center text-[24px] ${connState === 'connected' ? 'bg-brand-green text-white' : 'bg-bg-neutral'}`}>{connState === 'connected' ? <Icons.Check className="w-6 h-6"/> : "🚲"}</div>
                                        <div className="ml-4 text-left flex-grow"><h3 className="font-bold">Sunny Bike B100</h3><span className="text-[12px] text-text-secondary">Signal Strong</span></div>
                                        {connState === 'connecting' && <Icons.Loader className="w-5 h-5 animate-spin text-brand-blue"/>}
                                    </div>
                                ) : <p className="animate-pulse text-text-secondary">Searching...</p>}
                            </div>
                        )}

                        {connectedSuccess && (
                            <div className="w-full text-center animate-fade-up" data-zone-id="device_connect_branch_equipment" data-prd-zone="device_connect_branch_equipment">
                                <div className="text-brand-green text-7xl mb-6 animate-pop">✓</div>
                                <h3 className="text-[24px] font-bold mb-3">Connected!</h3>
                                <p className="text-[14px] text-text-secondary mb-8">Your Sunny Bike is ready. Start your first workout.</p>
                            </div>
                        )}

                        {flowStep === 'manual_entry' && (
                            <div className="w-full animate-fade-up" data-zone-id="device_connect_manual_entry" data-prd-zone="device_connect_manual_entry">
                                <input type="text" placeholder="Model e.g. SF-0001" className="w-full h-14 bg-white rounded-[16px] px-5 outline-none font-bold shadow-sm border border-gray-200" value={searchModel} onChange={(e) => setSearchModel(e.target.value)} />
                                <p className="text-[11px] text-text-secondary mt-3 italic text-center">Try "SF-0001" for a match simulation.</p>
                            </div>
                        )}

                        {flowStep === 'check_bt' && (
                            <div className="text-center animate-fade-up w-full" data-zone-id="device_connect_check_bt" data-prd-zone="device_connect_check_bt">
                                <div className="text-brand-green text-6xl mb-4">✔</div>
                                <h3 className="text-[20px] font-bold mb-6">Model Supported!</h3>
                                <div className="space-y-3 mb-10">
                                    {['Check display console.', 'Stay within 5m.', 'Disconnect others.'].map((t, i) => <div key={i} className="bg-white p-4 rounded-[16px] text-left text-sm font-medium shadow-card">{t}</div>)}
                                </div>
                            </div>
                        )}

                        {flowStep === 'incompatible' && (
                            <div className="animate-fade-up w-full" data-zone-id="device_connect_incompatible" data-prd-zone="device_connect_incompatible">
                                <div className="bg-brand-beige rounded-[28px] p-8 text-center mb-8">
                                    <h3 className="text-[20px] font-bold mb-4">Your equipment is a manual model</h3>
                                    <p className="text-sm opacity-70 mb-6">Your effort always counts. Let's build a tailored plan to track every calorie you burn.</p>
                                </div>
                            </div>
                        )}
                    </div>

                    <div className="px-6 pb-12 pt-4 bg-gradient-to-t from-bg-page via-bg-page to-transparent shrink-0" data-zone-id="device_connect_cta" data-prd-zone="device_connect_cta">
                        {flowStep === 'prep' && (
                            <button onClick={() => setShowModal(true)} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn" data-i18n="device_btn_ready">I'm Ready</button>
                        )}
                        {flowStep === 'scanning' && !connectedSuccess && (
                            <button onClick={() => setFlowStep('manual_entry')} className="w-full text-[13px] font-bold text-brand-blue underline">Can't find device?</button>
                        )}
                        {flowStep === 'manual_entry' && (
                            <button onClick={checkModel} className="w-full py-4 bg-brand-blue text-white rounded-[16px] font-bold mt-6 shadow-lg">Verify Device</button>
                        )}
                        {flowStep === 'check_bt' && (
                            <button onClick={() => setFlowStep('scanning')} className="w-full py-4 bg-brand-blue text-white rounded-[16px] font-bold">Retry Connection</button>
                        )}
                        {flowStep === 'incompatible' && (
                            <button onClick={() => window.navigateTo('plan_create')} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold">Create My Plan</button>
                        )}
                        {connectedSuccess && (
                            <button onClick={() => window.navigateTo('workout_reminder')} className="w-full py-4 bg-brand-red text-white rounded-[16px] font-bold shadow-float-btn">Start First Workout</button>
                        )}
                    </div>

                    {showModal && (
                        <div className="absolute inset-0 z-[60] bg-black/40 backdrop-blur-[2px] flex items-center justify-center p-6" data-zone-id="device_connect_permission" data-prd-zone="device_connect_permission">
                            <div className="bg-white/95 w-[280px] rounded-[14px] text-center overflow-hidden">
                                <div className="p-5 pb-4"><h3 className="font-semibold mb-1">Bluetooth Permission</h3><p className="text-[13px] opacity-80" data-i18n="device_permission_text">To find your Sunny equipment, I need Bluetooth access.</p></div>
                                <div className="border-t flex text-[17px]"><button onClick={() => setShowModal(false)} className="flex-1 py-3 text-blue-500 border-r">Deny</button><button onClick={handleAllowPermission} className="flex-1 py-3 text-blue-500 font-bold">Allow</button></div>
                            </div>
                        </div>
                    )}

                    {showScanFailedModal && (
                        <div className="absolute inset-0 z-[60] bg-black/40 backdrop-blur-[2px] flex items-center justify-center p-6" data-zone-id="device_connect_scan_failed" data-prd-zone="device_connect_scan_failed">
                            <div className="bg-white w-[300px] rounded-[20px] p-6 text-center">
                                <h3 className="font-bold text-[18px] mb-2">Scan Failed</h3>
                                <p className="text-[14px] text-text-secondary mb-6">No device found within 10 seconds. Check that your equipment is powered on and within 5m.</p>
                                <button onClick={() => { setShowScanFailedModal(false); setFlowStep('manual_entry'); }} className="w-full py-3 bg-brand-blue text-white rounded-[12px] font-bold mb-3">Verify Model</button>
                                <button onClick={() => setShowScanFailedModal(false)} className="w-full py-3 text-text-secondary font-medium">Retry Scan</button>
                            </div>
                        </div>
                    )}
                </div>
            );
        };

        const App = () => (
            <div className="mobile-viewport font-sans">
                <DeviceConnectionFlow />
            </div>
        );

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
